<!DOCTYPE html>
<html lang="ko">
<head>

<title>신용카드 인증</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
<script type="text/javascript" src="../../../js/libs/jquery/jquery-1.11.0.min.js"></script>

</head>
<body>

<!-- fullpopup 영역 -->
<div class="fullpop-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="fullpop-head">
			<h1>신용카드 인증</h1>
			<button class="lbtn btn-pop-close">닫기</button>
		</div>
	</header>
	<!-- //header -->

	<!-- body 스크롤영역 -->
	<div class="d-scroll">
		<div class="fullpop-cont"><!-- 10.23 bg 클래스 삭제 -->
			<div class="cont3">
				<ul class="write-st04">
					<li>
						<label for="card-corp">카드사</label>
						<div>
							<select class="select" id="card-corp">
								<option value="">선택하세요</option>
							</select>	
						</div>
					</li>
					<li>
						<label for="card-number">카드번호 뒷 8자리</label>
						<div>
							<input type="number" class="inp-wrap" id="card-number">
							<input type="number" class="inp-wrap" id="auth-number2">
						</div>
					</li>
					<li>
						<label for="tel">연락처</label>
						<div class="pdb-n">
							<input type="tel" class="inp-wrap" id="tel" disabled>
						</div>
						<div class="btnArea">
							<button class="mbtn-2 btn-st11">카드 인증요청</button>
						</div>	
					</li>
					<li>
						<label for="tel">ARS 인증 확인</label>
						<div class="btnArea">
							<button class="mbtn-2 btn-st01" disabled>인증확인</button>
						</div>	
					</li>
				</ul>
				
				<!-- 10.23 삭제 
				<ul class="toggle toggle-round mat_15">
					<li>
						<div class="toggle-header">
							<div class="title">
								<span class="ico-txt-st02">신용카드 안내</span>
							</div>
							<button type="button" class="btn-toggle">더보기</button>
						</div>
						<div class="toggle-con">
							<div class="cont">
								<ul class="bul-list-st02">
									<li>정확한 정보를 입력한 후에도 인증에 실패하였다면 시스템 및 통신에러가
									발생하여 브라우저 또는 통신상의 일시적인 장애 현상일 수 있으니 잠시
									후 재시도해주시기 바라며 문제가 지속될 경우 (주)다우데이타
									<span class="fc-orange">고객센터(1588-6481)</span>로 문의 바랍니다.</li>
								</ul>
							</div>
						</div>
					</li>
				</ul>
				-->
			</div>
			<!-- 10.23 추가 -->
			<div class="notice_box">
				<dl>
					<dt>신용카드인증 안내</dt>
					<dd>
						<ul class="bul-list-st01">
							<li>정확한 정보를 입력한 후에도 인증에 실패하였다면 시스템 및 통신에러가
								발생하여 브라우저 또는 통신상의 일시적인 장애 현상일 수 있으니 잠시
								후 재시도해주시기 바라며 문제가 지속될 경우 (주)다우데이타

						</ul>
					</dd>
				</dl>
			</div>

	<!-- footer 고정영역 -->
	<footer>
		<div class="fullpop-footer">
			<button class="lbtn btn-st04">확인</button>
		</div>

	<!-- //footer -->

</div>
