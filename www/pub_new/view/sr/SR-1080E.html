<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>보완문서 작성</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
</head>
<body>

<!-- fullpopup 영역 -->
<div class="fullpop-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="fullpop-head">
			<h1>보완문서 작성</h1>
			<button class="lbtn btn-pop-close">닫기</button>
		</div>
	</header>
	<!-- //header -->

	<!-- body 스크롤영역 -->
	<div class="d-scroll">
		<div class="fullpop-cont">
			<div class="notice-txt btm-line">
				<p class="icoTxt">다음 각 항목에 대하여 금액을 확인해주세요.</p>
			</div>
			<div class="cont1">
				<ul class="write-st02 half">
					<li>
						<label for="la1" class="label-txt">표준미달체 납입보험료</label>
						<div class="dform">
							<input type="tel" class="inp-wrap ta-r" id="la1" value="5,104,000" disabled><span class="won">원</span><!-- 9.25 수정 -->
						</div>
					</li>
					<li>
						<label for="la2" class="label-txt">표준체보험료</label><!-- 9.18 수정 -->
						<div class="dform"><!-- 9.25 수정 -->
							<input type="tel" class="inp-wrap ta-r" id="la2" value="5,104,000" disabled><span class="won">원</span>
						</div>
						<!--  가필시 
						<div class="dform gapil-box">
							<span class="gapil inp-wrap">
								<label for="la2">100</label>
								<input type="tel" class=" ipt" id="la2" disabled>
							</span>
							<span class="won">원</span>
						</div>
						 -->
					</li>
					<li>
						<label for="la3" class="label-txt">할증보험료</label>
						<div class="dform">
							<input type="tel" class="inp-wrap ta-r" id="la3" value="5,104,000" disabled><span class="won">원</span><!-- 9.25 수정 -->
						</div>
					</li>
				</ul>
			
				<ul class="bul-list-st02 mat_20"><!-- 9.25 수정 -->
					<li>표준미달체  납입보험료 = 표준체보험료 + 할증보험료</li>
					<li>할증보험료 납입하시면 표준체와 동일한 보장을 받습니다.<br>
					단, 사망 또는 생존시 지급하는 금여금 중 기납입보험료는 표준체의 보통보험료를 기준으로 합니다.</li>
				</ul>
				
				<!-- 9.25 추가 -->
				<h2 class="h3-tit-st01 mat_40">할증보험료 이체(출금동의) 신청내역</h2>
				<ul class="write-st04">
					<li>
						<label for="lab-1">은행명</label>
						<div>
							<input type="text" id="lab-1" class="inp-wrap" value="은행은행" disabled="">
							<button class="sbtn-search-g">찾기</button>
						</div>
					</li>
					<li>
						<label for="lab-2">계좌번호</label>
						<div>
							<input type="text" id="lab-2" class="inp-wrap" value="333-444-555-666666" disabled="">
						</div>
					</li>
				</ul>
			</div>
		</div>
	</div>

	<!-- footer 고정영역 -->
	<footer>
		<div class="fullpop-footer">
			<button class="lbtn btn-st04">확인</button>
		</div>
	</footer>
	<!-- //footer -->

</div>
<!--// fullpopup 영역 -->

</body>
</html>
