<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>보완문서 작성</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
</head>
<body>

<!-- fullpopup 영역 -->
<div class="fullpop-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="fullpop-head">
			<h1>보완문서 작성</h1>
			<button class="lbtn btn-pop-close">닫기</button>
		</div>
	</header>
	<!-- //header -->

	<!-- body 스크롤영역 -->
	<div class="d-scroll">
		<div class="fullpop-cont">
			<div class="notice-txt">
				<p class="icoTxt">다음 각 항목의 질문사항에 대하여 구체적으로<br> 기재해 주시기 바랍니다.</p>
			</div>
			
			<div class="gray-box">
				<ol class="write-st07">
					<li>
						<label for="la-1"><span class="no">01</span>근무처/근무지역<em>(직장명)</em></label>
						<div>
							<input type="text" id="la-1" class="inp-wrap">
						</div>
					</li>
					<li>
						<label for="la-2"><span class="no">02</span>취급하는 업무<em>(하시는 일)</em></label>
						<div>
							<input type="text" id="la-2" class="inp-wrap">
						</div>
					</li>
				</ol>
			</div>
		</div>
	</div>

	<!-- footer 고정영역 -->
	<footer>
		<div class="fullpop-footer">
			<button class="lbtn btn-st04">확인</button>
		</div>
	</footer>
	<!-- //footer -->

</div>
<!--// fullpopup 영역 -->

</body>
</html>
