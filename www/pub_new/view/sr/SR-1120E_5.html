<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>보완문서 작성</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
</head>
<body>

<!-- fullpopup 영역 -->
<div class="fullpop-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="fullpop-head">
			<h1>보완문서 작성</h1>
			<button class="lbtn btn-pop-close">닫기</button>
		</div>
	</header>
	<!-- //header -->

	<!-- body 스크롤영역 -->
	<div class="d-scroll">
		<div class="fullpop-cont">
			<div class="notice-txt btm-line">
				<p class="icoTxt ta-l">다음 각 항목의 질문사항에 대하여 해당란에 (v)표시를 하시기 바랍니다.</p>
			</div>
			<div class="cont1">
				<ol class="qaBox">
					<li>
						<p class="qaBox-q"><span class="no">10</span>향후 3개월 이내에 다음과 같은 해외위험지역으로 출국할 예정이 있습니까?</p>
						<p class="desc-txt">위험지역:전쟁지역,미개척지(열대,한대),등반산악지대</p>
						<p class="qaBox-a checkBox-st01">
							<input type="radio" id="Q10-1" name="Q10"><label for="Q10-1">예</label>
							<input type="radio" id="Q10-2" name="Q10"><label for="Q10-2">아니오</label>
						</p>
						<div class="qaBox-ex">
							<ul class="write-st02">
								<li><!-- 2018-05-03 / 2018-05-04 -->
									<label for="la10-1">출국예정일</label>
									<div>
										<input type="tel" id="la10-1" class="inp-wrap" placeholder="출국일 입력">
										<input type="date" class="sbtn-calendar" title="달력보기">
									</div>
								</li>
								<li><!-- 2018-05-03 / 2018-05-04 -->
									<label for="la10-2">귀국예정일</label>
									<div>
										<input type="tel" id="la10-2" class="inp-wrap" placeholder="귀국일 입력">
										<input type="date" class="sbtn-calendar" title="달력보기">
									</div>
								</li>
								<li>
									<label for="la10-3">지역</label>
									<div>
										<input type="text" id="la10-3" class="inp-wrap">
									</div>
								</li>
								<li>
									<label for="la10-4">목적</label>
									<div>
										<input type="text" id="la10-4" class="inp-wrap">
									</div>
								</li>
							</ul>
						</div>
					</li>

					<li>
						<p class="qaBox-q"><span class="no">11</span> 월 소득(계약자 기준)</p>
						<div class="qaBox-a">
							<ul class="write-st02">
								<li>
									<label for="la11-1">월 평균</label>
									<div>
										<select class="select flex" id="la11-1">
											<option value="">300 ~ 400</option>
										</select>
										<span class="won">만원</span>
									</div>
								</li>
							</ul>
						</div>
					</li>

					<li>
						<p class="qaBox-q"><span class="no">12</span> 음주 여부</p>
						<p class="qaBox-a checkBox-st01">
							<input type="radio" id="Q12-1" name="Q12"><label for="Q12-1">예</label>
							<input type="radio" id="Q12-2" name="Q12"><label for="Q12-2">아니오</label>
						</p>
						<div class="qaBox-ex">
							<ul class="write-st02">
								<li>
									<label for="la12-1">음주횟수<span class="stxt">(주)</span></label>
									<div>
										<input type="tel" id="la12-1" class="inp-wrap"><span class="won">회</span>
									</div>
								</li>
								<li>
									<label for="la12-2">음주량<br><span class="stxt">(소주기준1회)</span></label>
									<div>
										<input type="tel" id="la12-2" class="inp-wrap"><span class="won">병</span>
									</div>
								</li>
							</ul>
						</div>
					</li>
				</ol>
			</div>
		</div>
	</div>

	<!-- footer 고정영역 -->
	<footer>
		<div class="fullpop-footer">
			<button class="lbtn btn-st22 flex0 w120">이전</button>
			<button class="lbtn btn-st04">다음</button>
		</div>
	</footer>
	<!-- //footer -->

</div>
<!--// fullpopup 영역 -->

</body>
</html>
