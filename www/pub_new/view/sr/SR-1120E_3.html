<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>보완문서 작성</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
</head>
<body>

<!-- fullpopup 영역 -->
<div class="fullpop-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="fullpop-head">
			<h1>보완문서 작성</h1>
			<button class="lbtn btn-pop-close">닫기</button>
		</div>
	</header>
	<!-- //header -->

	<!-- body 스크롤영역 -->
	<div class="d-scroll">
		<div class="fullpop-cont">
			<div class="notice-txt btm-line">
				<p class="icoTxt ta-l">다음 각 항목의 질문사항에 대하여 해당란에 (v)표시를 하시기 바랍니다.</p>
			</div>
			<div class="cont1">
				<p class="list-tit02 lineheight_13">상기 질문사항(1번~6번)중 “ 예”를 체크하신 것이 있습니다.<br>병명 등의 상세정보를 입력해 주시기 바랍니다.(3개까지)</p>
					
				<div class="tab-add full">
					<ul class="list">
						<li class="on">
							<button type="button" class="rtab"><span>병력1</span></button>
							<button type="button" class="del"><span>삭제</span></button>
						</li>
						<li>
							<button type="button" class="rtab"><span>병력2</span></button>
							<button type="button" class="del"><span>삭제</span></button>
						</li>
					</ul>
					<button type="button" class="rtab-add"><span>탭추가</span></button>
				</div>
				<div class="tab-cont">
					<ul class="write-st02">
						<li>
							<label for="la-1" class="label-txt">병명</label>
							<div>
								<input type="text" id="la-1" class="inp-wrap">
							</div>
						</li>
						<li><!-- 2018-05-03 / 2018-05-04 -->
							<label for="la-2-1" class="label-txt">치료기간</label>
							<div>
								<input type="tel" id="la-2-1" class="inp-wrap" placeholder="시작일 입력">
								<input type="date" class="sbtn-calendar" title="달력보기">
								<span class="dash">~</span>
								<input type="tel" id="la-2-2" class="inp-wrap" placeholder="종료일 입력">
								<input type="date" class="sbtn-calendar" title="달력보기">
							</div>
						</li>
						<li><!-- 2018-05-21 -->
							<label for="la-6" class="label-txt">치료내용</label>
							<div>
								<input type="text" id="la-6" class="inp-wrap">
							</div>
						</li>
						<li>
							<label for="la-3" class="label-txt">치료병원</label>
							<div>
								<input type="text" id="la-3" class="inp-wrap">
							</div>
						</li>
						<li>
							<label for="la-4" class="label-txt">재발경험</label>
							<div class="checkBox-st01">
								<input type="radio" id="la-4-1" name="la-4"><label for="la-4-1">예</label>
								<input type="radio" id="la-4-2" name="la-4"><label for="la-4-2">아니오</label>
							</div>
						</li>
						<li>
							<label for="la-5" class="label-txt">완치여부</label>
							<div class="checkBox-st01">
								<input type="radio" id="la-5-1" name="la-5"><label for="la-5-1">예</label>
								<input type="radio" id="la-5-2" name="la-5"><label for="la-5-2">아니오</label>
							</div>
						</li>
					</ul>
				</div>
			</div>
		</div>
	</div>

	<!-- footer 고정영역 -->
	<footer>
		<div class="fullpop-footer">
			<button class="lbtn btn-st22 flex0 w120">이전</button>
			<button class="lbtn btn-st04">다음</button>
		</div>
	</footer>
	<!-- //footer -->

</div>
<!--// fullpopup 영역 -->

</body>
</html>
