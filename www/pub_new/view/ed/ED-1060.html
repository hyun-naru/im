<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>콜센터 전자문서 접수서비스</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
<script type="text/javascript" src="../../../js/libs/jquery/jquery-1.11.0.min.js"></script>
<script type="text/javascript" src="../../../js/libs/ui.js"></script>
</head>
<body>

<!-- 화면 영역 -->
<div class="d-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="d-head">
			<h1>콜센터 전자문서 접수서비스</h1>
		</div>
	</header>
	<!-- //header -->

	<!-- body 스크롤영역 -->
	<div class="d-scroll">
		<div class="d-cont">
			<!-- d-step  -->
			<div class="d-step">
				<h2>신청업무 확인</h2>
				<p class="d-step-status">
					<span class="on">1</span>
					<span class="on">2</span>
					<span class="on">3</span>
					<span class="on">4</span>
					<span>5</span>
					<span>6</span>
					<span>7</span>
				</p>
			</div>
			<!-- //d-step  -->
			
			<div class="contract-info">
				<div class="cont3">
					<div class="tit-box">
						<h3 class="h3-tit-st01">고객님이 신청하신 업무를 확인해주세요.</h3>	
					</div>
					<ul class="write-st04">
						<li>
							<label for="name">신청업무</label>
							<div>
								<input type="text" class="inp-wrap" id="name" value="보험계약대출" disabled>
							</div>
						</li>
						<li>
							<label for="sum">대출신청 총금액</label>
							<div>
								<input type="text" class="inp-wrap ta-r" id="sum" value="1,000,000">
								<span class="won">만원</span>
							</div>
						</li>
					</ul>
				</div>
			</div>
			
			<div class="dl-list-cont line-top">
				<dl class="dl-list">
					<dt>서류를 확인해주세요.</dt>
					<dd>
						<button type="button" class="btn-confirm">
							<span class="flag flag-st08">미확인</span>
							<span class="stit">대출약정동의서</span>
							<!--
								미확인 : flag-st08
								확인  : flag-st07
							-->
						</button>
					</dd>
				</dl>

				<div class="box-gray mat_15 ta-c">
					<p class="txt">위 대출약정동의서를 확인하였고, 보험계약대출을 진행하는 것에 동의합니다.</p>
					<div class="sign-chk-btn w240">
						<input type="checkbox" id="sign-chk">
						<label for="sign-chk">확인</label>
					</div>
				</div>
			</div>
		</div>
	</div>
	<!-- //body 스크롤영역 -->

	<!-- footer 고정영역 -->
	<footer>
		<div class="d-footer">
			<button class="lbtn btn-st22 flex0 w120">이전</button>
			<button class="lbtn btn-st04">다음</button>
		</div>
	</footer>
	<!-- //footer 고정영역 -->
</div>
<!--//화면 영역 -->
</body>
</html>
