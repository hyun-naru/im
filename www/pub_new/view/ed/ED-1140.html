<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>DGB생명 위촉서류 전송서비스</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
<script type="text/javascript" src="../../../js/libs/jquery/jquery-1.11.0.min.js"></script>
<script type="text/javascript" src="../../../js/libs/ui.js"></script>
</head>
<body>

<!-- 화면 영역 -->
<div class="d-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="d-head">
			<h1>DGB생명 위촉서류 전송서비스</h1>
			<button class="lbtn btn-back">홈으로</button>
			<button class="rbtn btn-view-side">전체메뉴</button>
		</div>
	</header>
	<!-- //header -->

	<!-- body 스크롤영역 -->
	<div class="d-scroll">
		<div class="d-cont">
			<!-- d-step  -->
			<div class="d-step">
				<h2>위촉내용 확인</h2>
				<p class="d-step-status">
					<span class="on">1</span>
					<span class="on">2</span>
					<span class="on">3</span>
					<span>4</span>
					<span>5</span>
				</p>
			</div>
			<!-- //d-step  -->

			<div class="data-list02">
				<div class="tit-box">
					<h3 class="h3-tit-st01">위촉신청 정보</h3>
				</div>
				<ul class="list">
					<li>
						<div class="stit">대리점명</div>
						<div class="scon">한국A대리점</div>
					</li>
					<li>
						<div class="stit">대리점등록번호</div>
						<div class="scon">20120000000</div>
					</li>
					<li>
						<div class="stit">설계사명</div>
						<div class="scon">이서진</div>
					</li>
					<li>
						<div class="stit">생년월일</div>
						<div class="scon">870201</div>
					</li>
					<li>
						<div class="stit">점포코드(GA지점)</div>
						<div class="scon">88562014</div>
					</li>
					<li>
						<div class="stit">직책코드</div>
						<div class="scon">S2</div>
					</li>
					<li>
						<div class="stit">연락처</div>
						<div class="scon">010.1234.1234</div>
					</li>
				</ul>
			</div>
		</div>
	</div>
	<!-- //body 스크롤영역 -->
	
	<!-- footer 고정영역 -->
	<footer>
		<div class="d-footer">
			<button class="lbtn btn-st22 flex0 w120">이전</button>
			<button class="lbtn btn-st04">다음</button>
		</div>
	</footer>
	<!-- //footer 고정영역 -->

</div>
<!--//화면 영역 -->
</body>
</html>
