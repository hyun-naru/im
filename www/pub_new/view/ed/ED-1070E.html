<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>콜센터 전자문서 접수서비스</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
<script type="text/javascript" src="../../../js/libs/jquery/jquery-1.11.0.min.js"></script>
<script type="text/javascript" src="../../../js/libs/ui.js"></script>
</head>
<body>

<!-- 화면 영역 -->
<div class="d-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="d-head">
			<h1>콜센터 전자문서 접수서비스</h1>
		</div>
	</header>
	<!-- //header -->

	<!-- d-step 10.26 위치이동 -->
	<div class="d-step">
		<h2>계좌정보 입력</h2>
		<p class="d-step-status">
			<span class="on">1</span>
			<span class="on">2</span>
			<span class="on">3</span>
			<span class="on">4</span>
		</p>
	</div>
	<!-- //d-step  -->

	<!-- body 스크롤영역 -->
	<div class="d-scroll">
		<div class="d-cont">
			<div class="cont3 mab-n">
				<ul class="write-st04">
					<li>
						<label for="lab-1" class="h3-tit-st02">은행명</label>
						<div>
							<input type="text" id="lab-1" class="inp-wrap" value="">
							<button class="sbtn-search-g">찾기</button>
						</div>
					</li>
					<li>
						<label for="lab-2" class="h3-tit-st02">계좌번호</label>
						<div>
							<input type="text" id="lab-2" class="inp-wrap" value="">
						</div>
					</li>
				</ul>
				<p class="ico-txt-st01">본인명의의 계좌만 가능합니다.</p>
			</div>
			
			<div class="cont3">
				<ul class="list-d-line">
					<li>
						<span class="stit">계좌사본 제출</span>
						<span class="scon">
							<button class="sbtn-bdr-1 bdr-st06 w70"><span>첨부</span></button>
						</span>
					</li>
				</ul>
			</div>
		</div>
	</div>
	<!-- //body 스크롤영역 -->

	<!-- footer 고정영역 -->
	<footer>
		<div class="d-footer">
			<button class="lbtn btn-st22 flex0 w120">이전</button>
			<button class="lbtn btn-st04">다음</button>
		</div>
	</footer>
	<!-- //footer 고정영역 -->
</div>
<!--//화면 영역 -->
</body>
</html>
