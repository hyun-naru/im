<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>콜센터 전자문서 접수서비스</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
<script type="text/javascript" src="../../../js/libs/jquery/jquery-1.11.0.min.js"></script>
<script type="text/javascript" src="../../../js/libs/ui.js"></script>
</head>
<body>

<!-- 화면 영역 -->
<div class="d-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="d-head">
			<h1>콜센터 전자문서 접수서비스</h1>
		</div>
	</header>
	<!-- //header -->
	
	<!-- d-step 10.26 위치이동 -->
	<div class="d-step">
		<h2>실명정보확인</h2>
		<p class="d-step-status">
			<span class="on">1</span>
			<span>2</span>
			<span>3</span>
			<span>4</span>
			<span>5</span>
		</p>
	</div>
	<!-- //d-step  -->

	<!-- body 스크롤영역 -->
	<div class="d-scroll">
		<div class="d-cont">
			<div class="contract-info">
				<div class="cont3">
					<div class="tit-box">
						<h3 class="h3-tit-st01">실명정보 확인을 위해 이름과 주민번호를 입력해주세요.</h3>	
					</div>

					<ul class="write-st04">
						<li>
							<label for="name">이름</label>
							<div>
								<input type="text" class="inp-wrap" id="name" value="심미숙">
							</div>
						</li>
						<li>
							<label for="jumi-no">주민등록번호</label>
							<div>
								<input type="number" class="inp-wrap" id="jumi-no" value="770814">
								<span class="dash">~</span>
								<input type="text" class="inp-wrap" id="jumi-no2" value="1******">
							</div>
						</li>
					</ul>
				</div>
			</div>
		</div>
	</div>
	<!-- //body 스크롤영역 -->
	
	<!-- footer 고정영역 -->
	<footer>
		<div class="d-footer">
			<button class="lbtn btn-st04">다음</button>
		</div>
	</footer>
	<!-- //footer 고정영역 -->

</div>
<!--//화면 영역 -->
</body>
</html>
