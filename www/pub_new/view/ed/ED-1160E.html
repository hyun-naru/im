<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>DGB생명 위촉서류 전송서비스</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
<script type="text/javascript" src="../../../js/libs/jquery/jquery-1.11.0.min.js"></script>
<script type="text/javascript" src="../../../js/libs/ui.js"></script>
</head>
<body>

<!-- 화면 영역 -->
<div class="d-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="d-head">
			<h1>DGB생명 위촉서류 전송서비스</h1>
			<button class="lbtn btn-back">이전페이지 이동</button>
			<button class="rbtn btn-view-side">전체메뉴</button>
		</div>
	</header>
	<!-- //header -->

	<!-- d-step 10.26 위치 이동 -->
	<div class="d-step">
		<h2>추가서류 제출</h2>
		<p class="d-step-status">
			<span class="on">1</span>
			<span class="on">2</span>
			<span class="on">3</span>
			<span class="on">4</span>
			<span class="on">5</span>
		</p>
	</div>
	<!-- //d-step  -->

	<!-- body 스크롤영역 -->
	<div class="d-scroll">
		<div class="d-cont">
			<div class="cont3">
				<div class="tit-area">
					<h3 class="h3-tit-ico01">신분증 제출</h3>
					<div class="pos-ar">
						<button type="button" class="sbtn-bdr-1 bdr-st03 w60"><span>수정</span></button>
					</div>
				</div>

				<div class="box-line">
					<ul class="bul-list-st03">
						<li>
							신분증 제출시 주민번호와 주소 등이 식별될 수 있도록 촬영 및 이미지 첨부를 진행해 주세요.
						</li>
					</ul>
				</div>
			
				<div class="tit-area">
					<h3 class="h3-tit-ico01">변액자격증</h3>
					<div class="pos-ar">
						<button type="button" class="sbtn-bdr-1 bdr-st01 w60"><span>추가</span></button>
					</div>
				</div>

				<div class="box-line">
					<ul class="bul-list-st03">
						<li>
							변액보험판매자격 또는 종합자산관리사 합격증 등이 식별될 수 있도록 촬영 및 이미지 첨부를 진행해주세요.
						</li>
					</ul>
				</div>
			</div>
		</div>
	</div>
	<!-- //body 스크롤영역 -->
	
	<!-- footer 고정영역 -->
	<footer>
		<div class="d-footer">
			<button class="lbtn btn-st22 flex0 w120">이전</button>
			<button class="lbtn btn-st04">다음</button>
		</div>
	</footer>
	<!-- //footer 고정영역 -->

</div>
<!--//화면 영역 -->
</body>
</html>
