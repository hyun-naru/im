<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>ARS 인증 대기</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
<script type="text/javascript" src="../../../js/libs/jquery/jquery-1.11.0.min.js"></script>
<script type="text/javascript" src="../../../js/libs/ui.js"></script>
</head>
<body>

<!-- 화면 영역 -->
<div class="d-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="d-head">
			<h1>고객등록</h1>
			<button class="lbtn btn-back">이전페이지 이동</button>
			<button class="rbtn btn-view-side">전체메뉴</button>
		</div>
	</header>
	<!-- //header -->
	
	<!-- d-step 10.26 위치 이동 -->
	<div class="d-step">
		<h2>ARS 인증 대기</h2>
		<p class="d-step-status">
			<span class="on">1</span>
			<span class="on">2</span>
			<span class="on">3</span>
			<span>4</span>
		</p>
	</div>
	<!-- //d-step  -->

	<!-- body 스크롤영역 -->
	<div class="d-scroll">
		<div class="d-cont">

			<div class="consent-info">
				<span class="stit">동의서 번호</span><em class="scon">24560886</em>
			</div>
			
			<div class="cont3">
				<div class="ars-auth-txt1">
					<strong>이서진 고객님</strong>
					<p><em>ARS 인증</em>을 진행해주세요.</p>
				</div>
				<div class="ars-autn-tel">
					<div>
						<span class="stit">ARS 전화번호</span>
						<strong class="hp-number">080-081-5351</strong>
					</div>
					<a href="tel:080-081-5351" class="ico-tel">
						<span>080-081-5351 전화걸기</span>
					</a>
				</div>
				<p class="ars-auth-txt2">인증이 완료되면 다음 버튼을 클릭해주세요.</p>
				
			</div>
			
		</div>
	</div>
	<!-- //body 스크롤영역 -->

	<!-- footer 고정영역 -->
	<footer>
		<div class="d-footer">
			<button class="lbtn btn-st22 flex0 w120">이전</button>
			<button class="lbtn btn-st04">다음</button>
		</div>
	</footer>
	<!-- //footer 고정영역 -->
</div>
<!--//화면 영역 -->
</body>
</html>
