<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>고객등록</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
<script type="text/javascript" src="../../../js/libs/jquery/jquery-1.11.0.min.js"></script>
<script type="text/javascript" src="../../../js/libs/ui.js"></script>
</head>
<body>

<!-- 화면 영역 -->
<div class="d-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="d-head">
			<h1>고객등록</h1>
			<button class="lbtn btn-back">이전페이지 이동</button>
			<button class="rbtn btn-view-side">전체메뉴</button>
		</div>
	</header>
	<!-- //header -->

	<!-- body 스크롤영역 -->
	<div class="d-cont d-scroll customer-add">
		<div class="auth-way ico-chk">
			<h2 class="txt"><em>고객등록 방법</em>을 선택해주세요.</h2>
			<ul class="auth-way-list">
				<li><!-- 적합성 진단 -->
					<a href="#" class="way01">
						<span>휴대폰인증</span>
					</a>
				</li>
				<li>
					<a href="#" class="way05">
						<span>ARS인증</span>
					</a>
				</li>
				<li>
					<a href="#" class="way06">
						<span>신분증인증</span>
					</a>
				</li>
			</ul>
			<ul class="bul-list-st02">
				<li>휴대폰인증은 고객본인의 휴대폰번호로만 가능합니다.</li>
				<li>만 14세 미만의 경우, ARS등록을 진행해주세요.</li>
			</ul>

			<a href="#" class="btn-ars">
				<span class="tit">ARS미결</span><span class="count"><strong>04</strong> 건</span>
			</a>
			
			<ul class="bul-list-st02">
				<li>건수를 선택하면 해당 고객동의 목록조회 화면으로 이동합니다.</li>
			</ul>
		</div>
	</div>
	<!-- //body 스크롤영역 -->

	<!-- footer 고정영역 -->
	<footer>
		<div class="d-footer">
			<button class="lbtn btn-st04">등록하기</button>
		</div>
	</footer>
	<!-- //footer 고정영역 -->
</div>
<!--//화면 영역 -->
</body>
</html>
