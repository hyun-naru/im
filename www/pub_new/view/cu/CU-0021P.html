<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>레이어팝업</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
</head>
<body>

<!-- layerPop)관계자등록 레이어  -->
<div id="layer3" class="dpop-layer">
	<div class="dpop-container">
		<div class="dpop-head">
			<h1>관계자등록</h1>
			<button class="btn-pop-close" id="btn_CU0021P_close">닫기</button>
		</div>
		<div class="dpop-conts d-scroll">
			<table class="tb-data">
				<caption>성명, 주민등록번호,관계 항목</caption>
				<thead>
					<tr>
						<th scope="cols">성명</th>
						<th scope="cols">주민등록번호</td>
						<th scope="cols">관계</td>
					</tr>
				</thead>
				<tbody>
					<tr>
						<th scope="rows">
							<span class="name" id="CU0021P_CS_NAM">홍길동동동</span>
						</th>
						<td id="CU0021P_RRN">000000-1******</td>
						<td>
							<select class="select" id="CU0021P_CS_RLP_SECD">
							</select>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
		<div class="dpop-footer">
			<button class="mbtn-2 btn-st21" id="btn_cancel">취소</button>
			<button class="mbtn-2 btn-st01" id="btn_save">저장</button>
		</div>
	</div>
</div>
<!--// 레이어팝업 영역 -->


</body>
</html>
