<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>고객등록</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
</head>
<body>

<!-- fullpopup 영역 -->
<div class="fullpop-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="fullpop-head">
			<h1>고객등록</h1>
			<button class="lbtn btn-pop-close">닫기</button>
		</div>
	</header>
	<!-- //header -->

	<!-- body_resultBox 스크롤영역 -->
	<div class="fullpop-cont d-scroll  bg-st02">
		<div class="cont1" id="CU0100P_csInfDiv">
			<div class="h2-group">
				<h2 class="h2-st03">고객기본정보 입력</h2>
				<span class="pos-a-r">동의서번호 <em class="fc-blue bold maL-5" id="CU0100P_agdcNum">2455904</em></span>
			</div>
			<ul class="write-st05">
				<li>
					<label for="CU0100P_selcsStcnSecd" class="label-txt">고객명</label>
					<div>
						<select id="CU0100P_selcsStcnSecd" class="select"></select>
						<input class="inp-wrap" placeholder="이름을 입력하세요." type="text" id="CU0100P_edtCsNam" value="" maxlength="20"/>
					</div>
				</li>
				<li>
					<label for="lab2" class="label-txt">인증방법</label>
					<div class="dform circle01" id="CU0100P_rdoAuthMetdCodDiv">
						<label for="ra1_1"><input type="radio" name="ra1" id="ra1_1" />SMS</label>
						<label for="ra1_2"><input type="radio" name="ra1" id="ra1_2" />ARS+전자서식</label>
					</div>
				</li>
				<li>
					<label class="label-txt">이동통신사</label>
					<div>
						<span id="CU0100P_rdoComCoCdDiv">
							<select class="select w100p" id="CU0100P_selMComCoCd">
							</select>
						</span>
						<span id="CU0100P_selComCoCdDiv"><!-- 기타이동통신사 -->
							<select class="select w100p maL-5" id="CU0100P_selComCoCd">
							</select>
						</span>
					</div>
				</li>
				<li>
					<label for="CU0100P_selCpSecd" class="label-txt">휴대폰번호</label>
					<div>
						<select id="CU0100P_selCpSecd" class="select">
						</select>
						<input class="inp-wrap" type="tel" number id="CU0100P_edtCpGukn" value="" maxlength="4"/>

					</div>
				</li>
				<li>
					<label for="CU0100P_edtBrtYdm" class="label-txt">생년월일</label>
					<div class="dform square02 hbox jc">
						<input class="inp-wrap flex w100p" id="CU0100P_edtBrtYdm" type="tel" date data-name="picker" placeholder="생년월일(8자리) 입력" />
						<input type="date" class="sbtn-calendar" title="달력보기" data-name="picker"/>
						<label for="CU0100P_chkLunaSecd" class="w80 inline-block"><input type="checkbox" name="CU0100P_chkLunaSecd" id="CU0100P_chkLunaSecd" />음력</label>
					</div>
				</li>
				<li>
					<label for="lab5" class="label-txt">성별</label>
					<div class="dform circle01" id="CU0100P_rdoGndrSecdDiv">
						<label for="ra3_1"><input type="radio" name="ra3" id="ra3_1" />남자</label>
						<label for="ra3_2"><input type="radio" name="ra3" id="ra3_2" />여자</label>
					</div>
				</li>
				<li id="cfrmsend">
					<label for="lab6" class="label-txt">승인발송</label>
					<div class="dform circle01">
						<label for="CU0100P_rdoMsgSend_0"><input type="radio" name="CU0100P_rdoMsgSend" id="CU0100P_rdoMsgSend_0" value="1"/>알림톡</label>
						<label for="CU0100P_rdoMsgSend_1"><input type="radio" name="CU0100P_rdoMsgSend" id="CU0100P_rdoMsgSend_1" value="2"/>미전송</label>
					</div>
				</li>
				<li id="cfrmer" class="none">
					<label class="label-txt">승인대상자</label>
					<div id="cfrmerinf"></div>
				</li>
			</ul>

			<!-- 2018-05-15 친권자정보 -->
			<div class="mat_20">
				<div class="h2-group">
					<h2 class="h2-st03">친권자정보 입력</h2>
					<span class="pos-a-r dform square02">
						<label for="add-1"> <input id="add-1" type="checkbox" />친권자 확인 및 신규등록</label>
					</span>
				</div>
				<ul class="write-st05">
					<li>
						<label class="label-txt">친권자</label>
						<div><!-- 친권자 확인 및 신규등록: checked 시 disabled 해제 -->
							<input class="inp-wrap" placeholder="이름을 입력하세요." type="text" value="홍길동" disabled/>
							<button class="sbtn-5 btn-st01" disabled>검색</button>
						</div>
					</li>
					<li>
						<label class="label-txt">인증방법</label>
						<div class="dform circle01">
							<label for="ra1_1"><input type="radio" name="ra1" id="ra1_1" />SMS</label>
							<label for="ra1_2"><input type="radio" name="ra1" id="ra1_2" />ARS+전자서식</label>
						</div>
					</li>
					<li>
						<label class="label-txt">이동통신사</label>
						<div>
							<span>
								<select class="select w100p">
									<option>SKT</option>
									<option>KT</option>
									<option>LG U+</option>
									<option>기타</option>
								</select>
							</span>
							<span>
								<select class="select w100p maL-5">
									<option>SKT알뜰폰</option>
									<option>KT알뜰폰</option>
									<option>LG U+ 알뜰폰</option>
								</select>
							</span>
						</div>
					</li>
					<li>
						<label class="label-txt">휴대폰번호</label>
						<div>
							<select class="select">
								<option>선택</option>
							</select>
							<input class="inp-wrap" type="tel" value="0000"/>
							<input class="inp-wrap" type="tel" value="0000"/>
						</div>
					</li>
					<li>
						<label class="label-txt">생년월일</label>
						<div class="dform square02 hbox jc"><!-- 친권자 확인 및 신규등록: checked 시 disabled 해제 -->
							<input class="inp-wrap flex w100p" type="tel" placeholder="생년월일(8자리) 입력"  disabled/>
							<input type="date" class="sbtn-calendar" title="달력보기" disabled />
							<label for="add-5_1" class="w80 inline-block"><input type="checkbox" id="add-5_1" />음력</label>
						</div>
					</li>
					<li>
						<label class="label-txt">성별</label>
						<div class="dform circle01">
							<label for="add-6_1"><input type="radio" name="add-6" id="add-6_1" />남자</label>
							<label for="add-6_2"><input type="radio" name="add-6" id="add-6_2" />여자</label>
						</div>
					</li>
				</ul>
			</div>
			<!--// 2018-05-15 친권자정보 -->

			<div class="btnArea mat_20" id="CU0100P_btnAreaSms">
				<button class="lbtn btn-st02" id="CU0100P_saveSms">저장하기</button>
				<button class="lbtn btn-st01" id="CU0100P_sndSms">전송하기</button>
			</div>
			<div class="btnArea mat_20" id="CU0100P_btnAreaArs">
				<button class="lbtn btn-st01" id="CU0100P_saveArs">저장하기</button>
				<button class="lbtn btn-st04" id="CU0100P_sndArs">고객동의(전자서식)</button>
			</div>
		</div>

		<div class="cont1" id="CU0100P_cfrmNoDiv"> 
			<h3 class="h3-st01" id="CU0100P_smsTrmInf">2017.10.25 16:51에 전송, 15분 내 입력 바랍니다.</h3>
			<ul class="write-st05">
				<li>
					<label for="edtCfrmNo" class="label-txt">인증번호입력</label>
					<div>
						<input  class="inp-wrap" type="tel" number id="CU0100P_edtCfrmNo" maxlength="6"/>
						<button class="sbtn-5 btn-st01" id='CU0100P_btnCfrm'>인증</button>
					</div>
				</li>
			</ul>
			<h3 class="h3-st01">고객 인증정보 입력</h3>
			<ul class="write-st05">
				<li>
					<label for="edtRRN" class="label-txt">주민등록번호</label>
					<div>
						<input class="inp-wrap" type="tel" number id="CU0100P_edtRRN" maxlength="6"/><span class="dash">-</span>
						<input class="inp-wrap" type="password" id="CU0100P_edtRRN2" maxlength="7"/>
						<button class="sbtn-5 btn-st01" id="CU0100P_btnDupCheck">중복체크</button>
					</div>
				</li>
			</ul>

			<!-- 2018-05-15 오후 -->
			<div>
				<h3 class="h3-st01">친권자 인증정보 입력</h3>
				<ul class="write-st05">
					<li>
						<label class="label-txt">주민등록번호</label>
						<div>
							<input class="inp-wrap" type="tel" /><span class="dash">-</span>
							<input class="inp-wrap" type="password" />
							<button class="sbtn-5 btn-st01">중복체크</button>
						</div>
					</li>
				</ul>
			</div>
			<!--// 2018-05-15 오후 -->
		</div>

		<div class="cont1" id="CU0100P_arsProcessDiv">
			<h2 class="h2-st03">ARS+전자서식 진행 프로세스</h2>
			<div class="process decimal"><!-- 2018-05-23 -->
				<ol>
					<li><span>1</span>기본정보<br/>입력</li>
					<li><span>2</span>저장</li>
					<li><span>3</span>ARS등록</li>
					<li><span>4</span>고객동의<br/>(전자서식)</li>
					<li><span>5</span>등록완료</li>
				</ol>
				<p class="ars-tel"><span class="ico_ars">ARS 번호 안내</span> <em id="CU0100P_telNumber">080-081-5351</em></p>
			</div>
		</div>
	</div>

	<!-- footer 고정영역 -->
	<footer>
		<div class="fullpop-footer">
			<button class="lbtn btn-st01" id="CU0100P_btnAgrm">동의완료</button>
		</div>
	</footer>
	<!-- //footer -->

</div>
