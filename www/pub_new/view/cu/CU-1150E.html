<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>적합성 진단</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
<script type="text/javascript" src="../../../js/libs/jquery/jquery-1.11.0.min.js"></script>
<script type="text/javascript" src="../../../js/libs/ui.js"></script>
</head>
<body>

<!-- 화면 영역 -->
<div class="d-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="d-head">
			<h1>적합성 진단</h1>
			<button class="lbtn btn-back">이전페이지 이동</button>
			<button class="rbtn btn-view-side">전체메뉴</button>
		</div>
	</header>
	<!-- //header -->
	
	<!-- d-step 10.26 -->
	<div class="d-step">
		<h2>위험성향 질문</h2>
		<p class="d-step-status">
			<span class="on">1</span>
			<span class="on">2</span>
			<span class="on">3</span>
			<span class="on">4</span>
			<span>5</span>
			<span>6</span>
		</p>
	</div>
	<!-- //d-step  -->

	<!-- body --><!-- 10.31 구조 변경 -->
		<div class="d-cont bg-st01">
			<div class="d-scroll dia-question">
				<p class="question-txt">귀하가 가입하고자 하는 금융 상품은<br> 어떤 것인가요?</p>
				<ol class="label-list-st02">
					<li>
						<div class="item">
							<input type="radio" id="answer1_1" name="answer1">
							<label for="answer1_1">미해당</label>
						</div>
					</li>
					<li>
						<div class="item">
							<input type="radio" id="answer1_2" name="answer1">
							<label for="answer1_2">해당(65세 이상)</label>
						</div>
					</li>
					<li>
						<div class="item">
							<input type="radio" id="answer1_3" name="answer1">
							<label for="answer1_3">미해당(미성년자)</label>
						</div>
					</li>
				</ol>
			</div>
			<div class="paging-control">
				<button type="button" class="btn-prev"><span>이전 질문</span></button>
				<span class="paging-count">
					<em>1</em>/5
				</span>
				<button type="button" class="btn-next"><span>다음 질문</span></button>
			</div>
		
	</div>
	<!-- //body 스크롤영역 -->

	<!-- footer 고정영역 -->
	<footer>
		<div class="d-footer">
			<button class="lbtn btn-st22 flex0 w120">이전</button>
			<button class="lbtn btn-st04">진단결과 확인하기</button>
		</div>
	</footer>
	<!-- //footer 고정영역 -->
</div>
<!--//화면 영역 -->
</body>
</html>
