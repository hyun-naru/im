<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>한국신용정보원 계약 및 한도조회</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
</head>
<body>

<!-- fullpopup 영역 -->
<div class="fullpop-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="fullpop-head">
			<h1>한국신용정보원 계약 및 한도조회</h1>
			<button class="lbtn btn-pop-close">닫기</button>
		</div>
	</header>
	<!-- //header -->

	<!-- body 스크롤영역 -->
	<div class="d-scroll">
		<div class="fullpop-cont">
			<div>
				<ul class="tab">
					<li class="on"><button type="button">전체 보장내역</button></li>
					<li><button type="button">주요 보장내역</button></li>
				</ul>
			</div>

			

			<div class="cont1 bg-st02">
				<!-- 9.17 추가-->
				<!-- 전체 보장내역 -->
				<p class="bul-txt-st01">본 내역은 신용정보원에서 제공하는 피보험자 기준 전체 담보 합산입니다.</p>
				<!-- 주요 보장내역 
				<p class="bul-txt-st01">본 내역은 신용정보원에서 제공하는 주요 보장에 기초하여 작성되었습니다.</p>
				 <!-- /9.17 추가-->

				<div class="tab-all-box">
					<ul class="tab-st01">
						<li class="all on"><button type="button"><span>전체보장내역</span></button></li>
						<li><button type="button"><span>사망/장해</span></button></li><!-- 9.17 수정 -->
						<li><button type="button"><span>진단/수술</span></button></li>
						<li><button type="button"><span>입원/실손</span></button></li>
						<li><button type="button"><span>기타</span></button></li>
					</ul>
				</div>
			</div>

			<div class="cont1">
				<ul class="quarantee-list">
					<li>
						<div class="stit">질병사망</div>
						<div class="count"><span>1</span>건</div>
						<div class="scon">
							<span class="txt">보장금액</span>
							<span class="val"><em>20,000</em> 만원</span>
						</div>
					</li>
					<li>
						<div class="stit">뇌출혈 진단</div>
						<div class="count"><span>3</span>건</div>
						<div class="scon">
							<span class="txt">보장금액</span>
							<span class="val"><em>5,000</em> 만원</span>
						</div>
					</li>
					<li>
						<div class="stit">상해사망</div>
						<div class="count"><span>1</span>건</div>
						<div class="scon">
							<span class="txt">보장금액</span>
							<span class="val"><em>20,000</em> 만원</span>
						</div>
					</li>
					<li>
						<div class="stit">질병사망</div>
						<div class="count"><span>2</span>건</div>
						<div class="scon">
							<span class="txt">보장금액</span>
							<span class="val"><em>20,000</em> 만원</span>
						</div>
					</li>
				</ul>
			</div>
		</div>
	</div>
	<!-- body 스크롤영역 -->

</div>
<!--// fullpopup 영역 -->

</body>
</html>
