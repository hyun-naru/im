<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>심사처리결과</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
<script type="text/javascript" src="../../../js/libs/jquery/jquery-3.6.0.min.js"></script> <!-- 2026 dcNew ui용 스크립트 추가 -->
<script type="text/javascript" src="../../../js/libs/ui.js"></script> <!-- 2026 dcNew ui용 스크립트 추가 -->
</head>
<body>

<!-- fullpopup 영역 -->
<div class="fullpop-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="fullpop-head">
			<h1>심사처리결과</h1>
			<button class="lbtn btn-pop-close">닫기</button>
		</div>
	</header>
	<!-- //header -->

	<!-- body_resultBox 스크롤영역 -->
	<div class="fullpop-cont d-scroll bg-st02">
		<div>
			<p class="blueBox-st01">총 3건</p>
			<ul class="link-list-st01">
				<li>
					<div class="tit-h2 border-b-st01">
						<span class="pro-stit">전산심사가 정상적으로 처리되었습니다.</span>
					</div>
				</li>
				<li>
					<div class="tit-h2">
						<span class="pro-stit">첨부서류 필요 : 보험계약사항 비교안내 확인서</span>
					</div>
					<article class="link-list-con2">
						<ul class="bul-list-st01">
							<li>보험계약사항 비교안내 확인서를 첨부하세요.</li>
						</ul>
					</article>
				</li>
				<li>
					<div class="tit-h2">
						<span class="pro-stit">주피 일반진단 사항입니다.</span>
					</div>
					<article class="link-list-con2">
						<ul class="bul-list-st01">
							<li>오류코드 : PDS79123</li>
							<li>무진단합산진단(진단금액:52,000,000원, 진단범위 500,000,000원 ~ 9,999,999,999원)</li>
						</ul>
					</article>
				</li>
			</ul>
		</div>
	</div>

	<!-- footer 고정영역 -->
	<footer>
		<div class="fullpop-footer"><!-- 리스트선택시 disabled삭제 -->
			<button class="lbtn btn-st04">플랜/이력 저장</button>
			<button class="lbtn btn-st01" onclick="openLayerPop('pop01')">이력 저장</button>
			<!-- <button class="lbtn btn-st03">공유하기</button> -->
		</div>
	</footer>
	<!-- //footer -->

	<!-- 얼럿팝업 -->
	<!-- 가입제안 이력 저장 -->
	<div class="dim-layer none" id="pop01">
		<div class="dimBg"></div>
		<div id="layer2" class="dpop-layer">
			<div class="dpop-container">
				<div class="dpop-head">
					<h1>알림</h1>
					<button class="btn-pop-close" onclick="closeCurrentPop(this)">닫기</button>
				</div>
				<div class="dpop-conts d-scroll">
					<h2 class="h2-tit-st01">현재 제안한 내용을 저장하시겠습니까?</h2>
				</div>
	
				<div class="dpop-footer">
					<button class="mbtn-2 btn-st02">아니오</button>
					<button class="mbtn-2 btn-st01" onclick="openLayerPop('pop02')">예</button>
				</div>
			</div>
		</div>
	</div>

	<!-- 가입제안 이력 저장 완료, 추가 진행여부 확인 -->
	<div class="dim-layer none" id="pop02">
		<div class="dimBg"></div>
		<div id="layer2" class="dpop-layer">
			<div class="dpop-container">
				<div class="dpop-head">
					<h1>알림</h1>
					<button class="btn-pop-close" onclick="closeCurrentPop(this)">닫기</button>
				</div>
				<div class="dpop-conts d-scroll">
					<h2 class="h2-tit-st01">가입제안 1건이 저장되었습니다.<br/>동일 고객의 추가 가입제안을 진행하시겠습니까?</h2>
				</div>
	
				<div class="dpop-footer">
					<button class="mbtn-2 btn-st02">아니오</button>
					<button class="mbtn-2 btn-st01">예</button>
				</div>
			</div>
		</div>
	</div>
	<!-- //얼럿팝업  -->
</div>
<!--// 화면 영역 -->
<script>
	/* 퍼블단 팝업 확인용 함수 */
	//열기
	function openLayerPop(popId) {
		$('#' + popId).removeClass('none');
	}
	//닫기
	function closeCurrentPop(buttonElement) {
		const currentPop = $(buttonElement).closest('.dim-layer');
		if (currentPop.length) {
			currentPop.addClass('none');
		}
	}
</script>
</body>
</html>
