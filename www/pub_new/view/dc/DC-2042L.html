<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>인심사요청</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
<script type="text/javascript" src="../../../js/libs/jquery/jquery-1.11.0.min.js"></script>
<script type="text/javascript" src="../../../js/libs/ui.js"></script>
</head>
<body>

<!-- fullpopup 영역 -->
<div class="fullpop-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="fullpop-head">
			<h1>인심사요청</h1>
			<button class="lbtn btn-pop-close">닫기</button>
		</div>
	</header>
	<!-- //header -->

	<!-- body 스크롤영역 -->
	<div class=" d-scroll">
		<div class="fullpop-cont">
			<div class="cont3">
				<ul>
					<li>
						<div class="pab_10"><label for="textarea01" class="GA-h3">상세내용</label></div>
						<textarea id="textarea01"></textarea>
					</li>	
					<li class="mat_20">
						<div class="pab_10"><p class="GA-h3">추가서류</p></div>
						<div class="notice-txt align-l pd-n">
							<p class="icoTxt">추가서류 제출은 사진 촬영 및 이미지파일 첨부로 진행이 가능합니다.</p>
						</div>
						<div class="checkBox-st01 d-lite_flex mat_20">
							<input id="ra-01" type="radio" name="ra" />
							<label for="ra-01">의적서류</label>
							<input id="ra-02" type="radio" name="ra" />						
							<label for="ra-02">재정서류</label>
							<input id="ra-03" type="radio" name="ra" />
							<label for="ra-03">기타서류</label>
						</div>
						<div class="photo-check-box">
							<div class="photo-check">
								<button class="photo-box">
									<img src="../../../img_new/img-sample.png" alt="">
								</button>
								<button class="photo-box">
									<img src="../../../img_new/img-sample.png" alt="">
								</button>
								<button class="photo-box">
									<img src="../../../img_new/img-sample.png" alt="">
								</button>
								<button class="photo-box">
									<img src="../../../img_new/img-sample.png" alt="">
								</button>
								<button class="photo-box">
									<img src="../../../img_new/img-sample.png" alt="">
								</button>
								<button class="photo-box">
									<img src="../../../img_new/img-sample.png" alt="">
								</button>
							</div>
						</div>
						<div class="btnArea mat_20">
							<button type="button" class="mbtn btn-st11"><span>첨부</span></button>
						</div>
					</li>
				</ul>
			</div>
		</div>
	</div>
	<!-- body 스크롤영역 -->

	<!-- footer 고정영역 -->
	<footer>
		<div class="fullpop-footer">
			<button class="lbtn btn-st04">인심사요청</button>
		</div>
	</footer>
	<!-- //footer -->

</div>
<!--// fullpopup 영역 -->

</body>
</html>
