<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>전자서류 전송 서비스</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
</head>
<body>


<!-- 2018-04-30 레이어팝업 영역 / 활성화시 class "none"삭제 -->
<div class="dim-layer none">
	<div class="dimBg"></div>
	<!-- layerPop)고객인증 레이어  -->
	<div id="layer1" class="dpop-layer ">
		<div class="dpop-container">
			<div class="dpop-head">
				<h1>고객인증</h1>
				<button class="btn-pop-close">닫기</button>
			</div>
			<div class="dpop-conts d-scroll">
				<p></p>
				<ul class="write-st04">
					<li>
						<label for="lab1">생년월일을 입력해주세요.</label>
						<div>
							<input id="lab1" class="inp-wrap" type="password" value=""/>
						</div>
					</li>
				</ul>
			</div>
			<div class="dpop-footer">
				<button class="mbtn-2 btn-st21">취소</button>
				<button class="mbtn-2 btn-st01">확인</button>
			</div>
		</div>
	</div>
</div>
<!--// 레이어팝업 영역 -->



<!-- 화면 영역 -->
<div class="d-wrap ">

	<!-- header 고정영역 -->
	<header>
		<div class="d-head">
			<h1>전자서류 전송 서비스</h1>
			<button class="lbtn btn-back">홈으로</button>
			<button class="rbtn btn-view-side">전체메뉴</button>
		</div>
	</header>
	<!-- //header -->


	<!-- body_resultBox 스크롤영역 2018-04-17 -->
	<div class="d-cont d-scroll">
		<div class="search">
			<ul>
				<li>
					<label for="sel2" class="label-txt2 w70">양식종류</label>
					<select id="sel2" class="select">
						<option>청약보완</option>
						<option>증권재발행</option>
						<option>모바일약관</option>
						<option>고객동의</option>
					</select>
				</li>
				<li>
					<label class="label-txt w70">구분</label>
					<p class="dform circle01">
						<label for="radio_01" class="flex w100p"><input id="radio_01" type="radio" name="radio" checked />고객명</label>
						<label for="radio_02" class="flex w100p"><input id="radio_02" type="radio" name="radio" />증권번호</label>
					</p>
				</li>
				<li><!-- 구분:고객명 선택일 경우 -->
					<label for="inp-1" class="label-txt2 w70">고객명</label>
					<input id="inp-1" type="text" class="inp-wrap" disabled value="홍길동(44/남)" />
					<button class="sbtn-search-w">찾기</button>
				</li>
				<li><!-- 구분:증권번호 선택일 경우 -->
					<label for="inp-1" class="label-txt2 w70">증권번호</label>
					<input id="inp-1" type="text" class="inp-wrap" value="123456789012" />
				</li>
				<li><!-- 양식종류:증권재발행 선택일 경우 -->
					<label class="label-txt w70">발행방법</label>
					<p class="dform circle01">
						<label for="ra2_01" class="flex w100p"><input id="ra2_01" type="radio" name="ra2" checked />모바일</label>
						<label for="ra2_02" class="flex w100p"><input id="ra2_02" type="radio" name="ra2" />이메일</label>
					</p>
				</li>
			</ul>
		</div>
		<div class="btnArea">
			<button class="lbtn-search" type="submit">검색</button>
		</div>


		<h2 class="result-txt">발송목록</h2>
		<!-- 화면1 -->
		<ul class="link-list-st01 dform circle01">
			<li><!-- 청약보완 list -->
				<div class="tit-h2">
					<input id="chk1" type="radio" />
					<label for="chk1">
						<span class="pro-num">123456789012</span>
						<span class="pro-stit">프리미엄건강보험 무배당</span>
					</label>
				</div>
				<article class="link-list-con">
					<ul class="bul-list-st01">
						<li>
							<span class="stit w70">계약일</span>
							<span class="scon">2018.04.19</span>
						</li>
						<li>
							<span class="stit w70">보완코드</span>
							<span class="scon fc-orange">5001</span>
							<span class="scon">질병/부위부담보</span>
						</li>
					</ul>
				</article>
			</li>
			<li><!-- 모바일약관/증권재발행 list -->
				<div class="tit-h2">
					<input id="chk2" type="radio" />
					<label for="chk2">
						<span class="pro-num">5160100021</span>
						<span class="pro-stit">프리미엄건강보험 무배당</span>
					</label>
				</div>
				<article class="link-list-con">
					<ul class="bul-list-st01 col-02">
						<li>
							<span class="stit">계약일</span>
							<span class="scon">2018.04.19</span>
						</li>
						<li>
							<span class="stit">계약자</span>
							<span class="scon">홍길동</span>
						</li>
						<li>
							<span class="stit">보종</span>
							<span class="scon">1234567</span>
						</li>
						<li>
							<span class="stit">휴대폰</span>
							<span class="scon">000-0000-0000</span>
						</li>
					</ul>
				</article>
			</li>
			<li><!-- 고객동의 list -->
				<div class="tit-h2">
					<input id="chk1" type="radio" />
					<label for="chk1">
						<span class="pro-stit">가입설계를 위한 개인(신용)정보 처리 동의서</span>
					</label>
				</div>
			</li>
		</ul>
	</div>

	<!-- footer 고정영역 -->
	<footer>
		<!-- 청약보완, 고객동의 시 노출 -->
		<div class="d-footer"><!-- 리스트선택시 disabled삭제 -->
			<button class="lbtn btn-st03 disabled">미리보기</button>
			<button class="lbtn btn-st01 disabled">발송하기</button>
		</div>

		<!-- 모바일약관 시 노출 -->
		<div class="d-footer none"><!-- 리스트선택시 disabled삭제 -->
			<button class="lbtn btn-st01 disabled">발송하기</button>
		</div>

		<!-- 증권재발행, 모바일해피콜 시 노출 -->
		<div class="d-footer none"><!-- 리스트선택시 disabled삭제 -->
			<button class="lbtn btn-st03 disabled">본인인증</button>
			<button class="lbtn btn-st01 disabled">발송하기</button>
		</div>
	</footer>
	<!-- //footer -->

</div>
<!--// 화면 영역 -->

</body>
</html>
