<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>가상고객입력</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
</head>
<body>

<!-- fullpopup 영역 --><!-- 2018-05-21 -->
<div class="fullpop-wrap dc-0030L">
	<!-- header 고정영역 -->
	<header>
		<div class="fullpop-head">
			<h1>가상고객입력</h1>
			<button class="lbtn btn-pop-close">닫기</button>
		</div>
	</header>
	<!-- //header -->

	<!-- body 스크롤영역 -->
	<div class="fullpop-cont d-scroll bg-st02">
		<div class="cont1">
			<h2 class="h2-st03">피보험자 정보</h2>
			<ul class="write-st05">
				<li>
					<label for="lab1" class="label-txt">이름</label>
					<div>
						<input type="text" class="inp-wrap" id="lab1" placeholder="이름을 입력하세요" value="고객"><!-- 10.05 수정 -->
					</div>
				</li>
				<li>
					<label for="lab9" class="label-txt">나이</label>
					<div>
						<input type="text" id="lab9" class="inp-wrap" type="tel"  placeholder="나이를 입력하세요" value="">
					</div>
				</li>
				<li><!-- 2018-05-03 -->
					<label for="lab2" class="label-txt">생년월일</label>
					<div>
						<input type="tel" id="lab2" class="inp-wrap" placeholder="생년월일(YYYYMMDD) 입력"><!-- 10.05 수정 -->
						<input type="date" class="sbtn-calendar" title="달력보기" />
					</div>
				</li>
				<li>
					<label class="label-txt">성별</label>
					<div class="checkBox-st01">
						<input type="radio" name="ra1" id="radio2_1" />
						<label for="radio2_1">남자</label>
						<input type="radio" name="ra1" id="radio2_2" />
						<label for="radio2_2">여자</label>
					</div>
				</li>
				<li>
					<label for="lab7" class="label-txt">직업</label>
					<div>
						<input type="search" class="inp-wrap" id="lab7" value="투자 및 신용 분석가" readonly><!-- 10.05 수정 -->
						<button class="sbtn-search-g">찾기</button>
					</div>
				</li>
				<li>
					<label for="lab8" class="label-txt">운전</label>
					<div>
						<input type="search" class="inp-wrap" id="lab8" value="무" readonly><!-- 10.05 수정 -->
						<button class="sbtn-search-g">찾기</button>
					</div>
				</li>
			</ul>
		</div>
	</div>

	<!-- footer 고정영역 -->
	<footer>
		<div class="fullpop-footer"><!-- 입력완료 시 disabled삭제 -->
			<button class="lbtn btn-st01" disabled>상품 선택하기</button>
		</div>
	</footer>
	<!-- //footer -->

</div>
<!--// fullpopup 영역 -->

</body>
</html>
