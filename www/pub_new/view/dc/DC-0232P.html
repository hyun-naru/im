<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

<title>신용카드정보관리</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>

<body>

<!-- fullpopup 영역 -->
<div class="fullpop-wrap">
	<!-- header 고정영역 -->

		<div class="fullpop-head">
			<h1>신용카드정보관리</h1>
			<button class="lbtn btn-pop-close">닫기</button>
		</div>
	</header>
	<!-- header  -->

	<!-- body 스크롤영역 -->
	<div class="fullpop-cont d-scroll bg-st02">
		<div>
			<div class="h-group">
				<h2>카드정보</h2>
				<p class="pos-ar">
					<button class="sbtn-3 btn-st09">삭제</button>
					<button class="sbtn-3 btn-st02">추가</button>
				</p>
			</div>

			<div class="cont1"><!-- 2018-05-21 -->
				<ul class="write-st02">
					<li>
						<label for="label1">카드번호</label>
						<div>
							<input id="label1" class="inp-wrap" type="tel" placeholder="-없이 입력해주세요." />

					</li>
					<li>
						<label for="label2">유효기간</label>
						<div><!-- 2018-05-03 / 2018-05-04 -->
							<input id="label2" class="inp-wrap" type="tel" placeholder="년월 입력" />

					</li>
				</ul>
				<div class="button-section">
					<button class="sbtn-5 btn-st21">취소</button>
					<button class="sbtn-search">저장</button>
				</div>
			</div>

			<ul class="link-list-st01 dform circle01">

					<label for="ra1">
						<div class="tit-h2">
							<input id="ra1" name="ra" type="radio" />

								<span class="pro-stit">비씨카드 5589-2012-08**-***</span>
							</p>
						</div>
						<article class="link-list-con">
							<ul class="bul-list-st01 col-02">
								<li>
									<span class="stit">소유주명</span>
									<span class="scon">홍길동</span>
								</li>
								<li>
									<span class="stit">신용카드상태</span>
									<span class="scon">정상</span>
								</li>
								<li class="fl-none">
									<span class="stit">상태확인일자</span>
									<span class="scon">2018-03-02</span>
								</li>
							</ul>
						</article>
					</label>
				</li>
				<li>
					<label for="ra2">

							<input id="ra2" name="ra" type="radio" />
							<p>
								<span class="pro-stit">비씨카드 5589-2012-08**-***</span>

							<ul class="bul-list-st01 col-02">

								<li>

									<span class="scon">2018-03-02</span>
								</li>
							</ul>

				<li>

						<div class="tit-h2">
							<input id="ra3" name="ra" type="radio" />
							<p>
								<span class="pro-stit">비씨카드 5589-2012-08**-***</span>
