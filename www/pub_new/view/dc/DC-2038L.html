<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>질병검색</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
</head>
<body>

<!-- fullpopup 영역 -->
<div class="fullpop-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="fullpop-head">
			<h1>질병검색</h1>
			<button class="lbtn btn-pop-close">닫기</button>
		</div>
	</header>
	<!-- //header -->
	<!-- body 스크롤영역 -->
	<div class="d-scroll">
		<div class="fullpop-cont">
			<div class="search">
				<ul>
					<li>
						<label for="log-no">질병코드/질병명</label><input type="text" class="inp-wrap" id="log-no" placeholder="입력">
					</li>
				</ul>
				<div class="btnArea">
					<button class="lbtn-search" type="submit">검색</button>
				</div>
			</div>
			<div>
				<h2 class="blind">검색결과 영역</h2>

				<!-- 검색 전 문구
				<div class="no-data">검색조건을 입력하고 검색을 진행해 주세요.</div>-->
				<!-- 검색 후 문구
				<div class="no-data">검색결과가 없습니다.</div>-->

				<p class="result-txt">총 <span class="count">2</span>건이 검색되었습니다.</p>
				<div class="cont1">
					<article class="pro-covenant mat-n mab-n">
						<div class="header pal_15 par_15" style="min-height:0rem">
							<ul class="link-list-st01 dform square02 pdt-n">
								<li class="bg-st02 pd-n border-n">
									<div class="tit-h2 pd-n">
										<input id="chk1" type="checkbox">
										<label for="chk1">
											<span class="Advance-stit par_n">[A00] 콜레라, 장티푸스 등 감염병 질환</span>
										</label>
									</div>
								</li>
							</ul>   
						</div>
						<ul class="list-limit ">
							<li class="maL-n">
								세균성 장감염 질환(콜레라, 장티푸스, 살모넬라 등)
							</li>
						</ul>
					</article>

					<article class="pro-covenant mat-n mab-n mat_15">
						<div class="header pal_15 par_15" style="min-height:0rem">
							<ul class="link-list-st01 dform square02 pdt-n">
								<li class="bg-st02 pd-n border-n">
									<div class="tit-h2 pd-n">
										<input id="chk2" type="checkbox">
										<label for="chk2">
											<span class="Advance-stit par_n">[A00] 콜레라, 장티푸스 등 감염병 질환</span>
										</label>
									</div>
								</li>
							</ul>   
						</div>
						<ul class="list-limit ">
							<li class="maL-n">
								세균성 장감염 질환(콜레라, 장티푸스, 살모넬라 등)
							</li>
						</ul>
					</article>
				</div>
			</div>
		</div>
	</div>
	<!-- footer 고정영역 -->
	<footer>
		<div class="d-footer">
			<button class="lbtn btn-st04" >선택</button>
		</div>
	</footer>
	<!-- //footer -->

</div>
<!--// fullpopup 영역 -->

</body>
</html>
