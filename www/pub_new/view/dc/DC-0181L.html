<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>옴니청약 발송</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
</head>
<body>

<!-- fullpopup 영역 -->
<div class="fullpop-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="fullpop-head">
			<h1>옴니청약 발송</h1>
			<button class="lbtn btn-pop-close">닫기</button>
		</div>
	</header>
	<!-- //header -->

	<!-- body_tab 고정영역 -->
	<div>
		<ul class="tab">
			<li class="on"><button>설계사 서명</button></li>
			<li><button>비교설명표</button></li>
		</ul>
	</div>

	<!-- body_tabcontents 스크롤영역 -->
	<div class="fullpop-cont d-scroll bg-st02">
		<div class="cont2 pat_100">
			<div class="h2-group">
				<h2 class="h2-st03">서명을 진행해주세요.</h2>
				<button class="sbtn-3 btn-st03">재서명</button>
			</div>
			<div class="blueline-st01">
				<span class="sign-txt">여기를 클릭해주세요.</span>
			</div>
		</div>
	</div>

	<!-- footer 고정영역 -->
	<footer>
		<div class="fullpop-footer"><!-- 입력완료 시 disabled삭제 -->
			<button class="lbtn btn-st01" >저장</button>
			<button class="lbtn btn-st02" >발송</button>
		</div>
	</footer>
	<!-- //footer -->

</div>
<!--// fullpopup 영역 -->

</body>
</html>
