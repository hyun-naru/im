<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>저가형 상해보험 청약</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
</head>
<body>

<!-- 화면 영역 -->
<div class="d-wrap ">

	<!-- header 고정영역 -->
	<header>
		<div class="d-head">
			<h1>저가형 상해보험 청약</h1>
			<button class="lbtn btn-back">홈으로</button>
			<button class="rbtn btn-view-side">전체메뉴</button>
		</div>
	</header>
	<!-- //header -->

	<!-- body_resultBox 스크롤영역 -->
	<div class="d-cont d-scroll">
		<div class="search"><!-- 2018-04-04 -->
			<ul>
				<li>
					<label for="inp-1" class="label-txt2">계약자<em>(주피보험자)</em></label>
					<input id="inp-1" type="text" class="inp-wrap" value="홍길동(44/남)" />
					<button class="sbtn-search-w">찾기</button>
				</li>
				<li>
					<label for="inp-2" class="label-txt2 w96">대표상품</label>
					<input id="inp-2" type="text" class="inp-wrap" value="새로운만남DGB생명보험(무)" disabled />
				</li>
				<li>
					<label for="sel2" class="label-txt2 w60">상품</label>
					<select id="sel2" class="select">
						<option>새로운만남DGB생명보험무배당 1604_1종(성인형)남자</option>
					</select>
				</li>
			</ul>
		</div>
		<div class="cont1">
			<ul class="write-st02">
				<li>
					<label for="lab-1">우편물수령지</label>
					<div class="dform circle01">
						<label for="radio2_1" class="flex"><input type="radio" name="ra1" id="radio2_1" checked />자택</label>
						<label for="radio2_2" class="flex"><input type="radio" name="ra1" id="radio2_2" />직장</label>
					</div>
				</li>
				<li>
					<label for="lab-2">주소(자택)</label>
					<div><!-- 2018-05-09 -->
						<input readonly id="lab4" class="inp-wrap" type="text" value="03367"/>
						<button class="sbtn-search-g">검색</button>
					</div>
					<div><input readonly class="inp-wrap" type="text" value="서울 은평구 불광동(불광1동)"/></div>
					<div><input readonly class="inp-wrap" type="text" value="건물명 국립환경연구원"/></div>
				</li>
				<li>
					<label for="lab-3">증권수령</label>
					<div>
						<input id="lab-3" class="inp-wrap" type="text" value="별도의 증권을 제공하지 않습니다." disabled />
					</div>
				</li>
				<li>
					<label for="lab-4">약관수령</label>
					<div>
						<input id="lab-4" class="inp-wrap" type="text" value="모바일로만 가능합니다." disabled />
					</div>
				</li>
				<li>
					<label for="lab-5">모집경로</label>
					<div>
						<select id="lab-5" class="select flex">
							<option>설계사 본인 및 가족</option>
						</select>
					</div>
				</li>
			</ul>
		</div>

		<div class="border-t"><!-- 2018-06-05  -->
			<h2 class="h3-st02 maL-10">개인정보동의</h2>
			<div class="cont1">
				<h3 class="h-st02">1. 계약체결 및 이행 등을 위한 개인신용정보 수집·이용,조회, 제공 동의</h3>
				<ul class="write-st02">
					<li>
						<label for="la3-1">계약자</label>
						<div class="checkBox-st01">
							<input id="la3-1-1" type="radio" name="la3-1"/><label for="la3-1-1">동의함</label>
							<input id="la3-1-2" type="radio" name="la3-1"/><label for="la3-1-2">동의안함</label>
						</div>
					</li>
				</ul>
			</div>
			<div class="cont1 border-t">
				<h3 class="h-st02">2. 상품소개를 위한 동의사항 </h3>
				<h4 class="mat_20">(1) 개인(신용)정보 수집·이용에 관한 동의</h4>
				<ul class="write-st02">
					<li>
						<div class="checkBox-st01">
							<input id="la3-2-1" type="checkbox" name="la3-2" /><label for="la3-2-1">전체</label>
							<input id="la3-2-2" type="checkbox" name="la3-2" /><label for="la3-2-2">계약자</label>
							<input id="la3-2-3" type="checkbox" name="la3-2" /><label for="la3-2-3">피보험자</label>
							<input type="tel" class="inp-wrap maL-10 w70"/><span class="dash">년</span>
						</div>
					</li>
				</ul>
				<h4>(2) 개인(신용)정보 제공에 관한 동의</h4>
				<ul class="write-st02">
					<li>
						<div class="checkBox-st01">
							<input id="la3-3-1" type="checkbox" name="la3-3" /><label for="la3-3-1">전체</label>
							<input id="la3-3-2" type="checkbox" name="la3-3" /><label for="la3-3-2">계약자</label>
							<input id="la3-3-3" type="checkbox" name="la3-3" /><label for="la3-3-3">피보험자</label>
							<input type="tel" class="inp-wrap maL-10 w70"/><span class="dash">년</span>
						</div>
					</li>
				</ul>
				<h4>(3) 상품소개를 위한 가입권유 연락방식(중복가능)</h4>
				<ul class="write-st02">
					<li>
						<div class="checkBox-st01">
							<input id="la3-4-1" type="checkbox" name="la3-4" /><label for="la3-4-1">전체</label>
							<input id="la3-4-2" type="checkbox" name="la3-4" /><label for="la3-4-2">전화</label>
							<input id="la3-4-3" type="checkbox" name="la3-4" /><label for="la3-4-3">SMS</label>
							<input id="la3-4-4" type="checkbox" name="la3-4" /><label for="la3-4-4">이메일</label>
							<input id="la3-4-5" type="checkbox" name="la3-4" /><label for="la3-4-5">우편</label>
						</div>
					</li>
				</ul>
			</div>
			<div class="cont1 border-t">
				<h3 class="h-st02">3. 보험계약자 사망 시 상속인 등 승계인이 보험수익자 지정, 변경권을 행사함</h3>
				<ul class="write-st02">
					<li>
						<div class="checkBox-st01">
							<input id="la3-5-1" type="radio" name="la3-5" /><label for="la3-5-1">동의함</label>
							<input id="la3-5-2" type="radio" name="la3-5" /><label for="la3-5-2">동의안함</label>
						</div>
					</li>
				</ul>
			</div>
			<div class="cont1 border-t">
				<h3 class="h-st02">4. 통신수단을 이용한 철회 및 해지요청 동의</h3>
				<ul class="write-st02">
					<li>
						<div class="checkBox-st01">
							<input id="la3-6-1" type="radio" name="la3-6"/><label for="la3-6-1">동의함</label>
							<input id="la3-6-2" type="radio" name="la3-6"/><label for="la3-6-2">동의안함</label>
						</div>
					</li>
				</ul>
			</div>
		</div>
	</div>

	<!-- footer 고정영역 -->
	<footer>
		<div class="d-footer"><!-- 리스트선택시 disabled삭제 -->
			<button class="lbtn btn-st02">심사처리</button>
			<button class="lbtn btn-st01">청약저장</button>
			<button class="lbtn btn-st03">청약진행</button>
		</div>
	</footer>
	<!-- //footer -->

</div>
<!--// 화면 영역 -->

</body>
</html>
