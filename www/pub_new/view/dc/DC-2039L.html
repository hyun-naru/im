<script>
/**
 * ====================================================================
 * [고지문항 작성 카운팅 팝업 가이드] 2026 dcNew
 * ====================================================================
 * .status-item의 data-target과 바닥페이지의 문항 li의 ID 를 매핑하여 체크 상태를 확인하도록 구현해두었습니다.
 * li내의 id와 .status-item의 data-target이 일치해야합니다. 
 * 하위 문항이 있는 질문의 경우 하위 문항까지 체크하여 완료되었을때 O,X 표시가 되도록했습니다.
 * form 타입에 따라 완결 상태를 구분짓기 위해서 li내에 data-type 이라는 별도의 데이터값을 부여했습니다.
 * 예/아니오값을 체크해야해서 퍼블단계에서 input radio에 data-ans 라는 데이터값을 부여했습니다.
 * [체크 스타일별 class 안내]
 * * 미답변 상태 : 클래스 모두 제거 (CSS에서 기본 회색 X 처리)
 * * 아니오 완결 : .state-no 추가 (빨간 X)
 * * 예/기타 완결   : .state-ok 추가 (초록 O)
 * [추가 필요 스크립트]
 * 질병쪽 체크가 어떤 기준으로 체크되는지 알 수 없어 기능을 연결하지 않았습니다. 
 */
function checkQaStatus() {
	let totalQuestions = 0;    
    let completedQuestions = 0;  
    
    // 팝업창 내의 모든 현황 아이템을 순회합니다.
    $('.status-item').each(function() {
        const $statusItem = $(this);
        const targetId = $statusItem.data('target'); // 예: 'qa-num01'
        const $li = $('#' + targetId);

        if (!$li.length) return; // 해당 문항이 바닥 마크업에 없으면 패스

        const type = $li.data('type'); // default, select-only, tel-only
        let statusClass = '';          // 기본값: 미답변 (회색 X)

        /* =======================================================
           [분기 1] 일반 예/아니오 유형 (data-type="default")
           ======================================================= */
        if (type === 'default') {
            const $radios = $li.find('.chk-main');           // 해당 문항의 [예/아니오] 라디오
            const $checkedRadio = $radios.filter(':checked'); // 사용자가 선택한 라디오
            
            if ($checkedRadio.length) {
                // 퍼블리싱 단계에서 심어둔 data-ans 속성으로 판별 (Y / N)
                const ansType = $checkedRadio.data('ans');
                
                // Case 1-1: [아니오] 선택 시 즉시 완결 처리 (빨간 X)
                if (ansType === 'N') {
                    statusClass = 'state-no'; 
                } 
                // Case 1-2: [예] 선택 시 하위 항목(.chk-sub) 체크 시작
                else if (ansType === 'Y') {
                    let subComplete = false;
                    const $subContent = $li.find('.qaBox-ex, .sub-content'); // 하위 답변 컨테이너
                    const $subInputs = $li.find('.chk-sub');                 // 하위 입력 요소들

					let subType = $subContent.attr('data-sub-type') || $subContent.data('sub-type');
					if (!subType) {
						const $innerTarget = $subContent.find('[data-sub-type]');
						subType = $innerTarget.attr('data-sub-type') || $innerTarget.data('sub-type');
					}

                    /* ---------------------------------------------------
					하위 분기 A: 라디오/체크박스/인풋이 복합적으로 섞인 유형 (08번 등)
					--------------------------------------------------- */
					if (subType === 'mix-match') {
						const $subGroups = $subContent.find('.sub-group');
                
						let checkedGroupCount = 0;   // 활성화된(선택된) 하위 선택 그룹 수
						let emptyInputCount = 0;     // 선택해놓고 값을 안 채운 인풋(text/tel) 수

						$subGroups.each(function() {
							const $group = $(this);
							
							// 1. [활성화 판정] 그룹 내 체크박스가 켜져 있거나, 혹은 라디오 버튼이 하나라도 체크되어 있다면 "선택된 그룹"으로 인정
							const isCheckboxChecked = $group.find('input[type="checkbox"]').first().is(':checked');
							const isRadioChecked = $group.find('input[type="radio"]:checked').length > 0;

							if (isCheckboxChecked || isRadioChecked) {
								checkedGroupCount++; // 활성화된 그룹 카운트 증가

								// 2. 해당 그룹 내부의 텍스트 기반 인풋창(text, tel) 수집 
								const $groupTexts = $group.find('input[type="text"], input[type="tel"]');
								
								$groupTexts.each(function() {
									// 3. 선택된 그룹인데 텍스트 입력창이 비어있다면 에러 누적
									if ($(this).val().trim() === '') {
										emptyInputCount++;
									}
								});
							}
						});

						// 최소 1개 이상의 하위를 선택했고 && 선택된 그룹 중 빈 인풋창이 단 하나도 없을 때만 완결!
						if (checkedGroupCount > 0 && emptyInputCount === 0) {
							subComplete = true;
						} else {
							subComplete = false;
						}
					}
                    /* ---------------------------------------------------
                       하위 분기 B: 단순 단독 입력 유형 
                       --------------------------------------------------- */
                    else {
                        subComplete = true; // 기본 완결 가정 후 밸리데이션
                        
                        if ($subInputs.is(':checkbox')) {
                            // 체크박스 형태인데 하나도 체크 안 헸으면 미완결
                            if ($subInputs.filter(':checked').length === 0) subComplete = false;
                        } else {
                            // 일반 text, tel 인풋창 중 하나라도 비어있으면 미완결
                            $subInputs.each(function() {
                                if ($(this).val().trim() === '') subComplete = false;
                            });
                        }
                    }
                    
                    // 하위 검증 최종 통과 시 초록 O 처리
                    if (subComplete) statusClass = 'state-ok';
                }
            }
        }
        
        /* =======================================================
           [분기 2] 최상위 셀렉트박스 예외 유형 (data-type="select-only")
           ======================================================= */
       else if (type === 'select-only') {
            const $select = $li.find('select'); // 클래스 누락 방어
            
            const selectedIndex = $select.find('option:selected').index();
            
            if (selectedIndex > 0) { 
                statusClass = 'state-ok'; // 첫 번째 기본 문구 외의 것을 골랐다면 완료
            }
        }
        
        /* =======================================================
           [분기 3] 최상위 tel 인풋 2개 예외 유형 (data-type="tel-only")
           ======================================================= */
        else if (type === 'tel-only') {
            let telComplete = true;
            const $tels = $li.find('input[type="tel"].chk-main');
            
            $tels.each(function() {
                if ($(this).val().trim() === '') {
                    telComplete = false; // 하나라도 비어있으면 미완결
                }
            });
            
            if (telComplete) statusClass = 'state-ok'; // 두 개 다 채우면 초록 O
        }

        /* =======================================================
        	최종 체크 클래스 반영
           ======================================================= */
        $statusItem.removeClass('state-no state-ok').addClass(statusClass);
    });

	//현황 카운팅
	totalQuestions = $('.status-item:not(.chk-exclude)').length; // 카운트 대상 총 문항 수
	compleQno = $('.state-no').length;
	compleQok = $('.state-ok').length;
	completedQuestions =  compleQno + compleQok; // 답변 완료(state-ok 또는 state-no)된 문항 수
	const $countLi = $('.count');
	if ($countLi.length) {
		$countLi.find('.current').text(completedQuestions); 
		$countLi.find('.max').text(totalQuestions);         
	}

    // 모든 내용이 갱신이 완료된 후 팝업 호출 (퍼블확인용 기존 오픈 함수)(팝업 호출용 스크립트는 변경하셔도 됩니다.)
	openFloating('floating-layer') // 퍼블확인용 ID 일반형: floating-layer | 간편형: floating-layer02
}


/**
 * ====================================================================
 * 폼 전체 내용 날리기 (초기화 버튼 연동)
 * ====================================================================
 */
function resetAllForm() {
    if (confirm("작성하신 모든 내용을 초기화하시겠습니까?")) {
        const $form = $('.qaBox');
        
        // 텍스트, 전화번호 입력창 전체 리셋
        $form.find('input[type="text"], input[type="tel"], textarea').val('');
        // 셀렉트 박스 초기화
        $form.find('select').val('');
        // 라디오 및 체크박스 체크 전체 해제
        $form.find('input[type="radio"], input[type="checkbox"]').prop('checked', false);
    }
	closeFloating('floating-layer'); //팝업 닫기 id값 확인
}


/**
 * ====================================================================
 * 모두 아니오 처리 (일반 유형만 강제 세팅)
 * ====================================================================
 */
function setAllNo() {
    if (confirm("모두 '아니오'로 선택하시겠습니까?")) {
        // data-type이 default인 문항만 타겟팅
        $('.qaBox li[data-type="default"]').each(function() {
            // data-ans="N" 속성을 가진 아니오 라디오 버튼을 강제 체크
            $(this).find('.chk-main[data-ans="N"]').prop('checked', true);
            
            // 하위 답변에 써있던 값들 리셋
            $(this).find('.chk-sub').val('').prop('checked', false);
        });
    }
	closeFloating('floating-layer'); //팝업 닫기 id값 확인
}

/**
 * ====================================================================
 * 버튼 클릭시 해당 문항 이동 온클릭용 함수
 * ====================================================================
 */
function moveToTarget(buttonElement) {
    const $item = $(buttonElement);
    const targetId = $item.data('target');
    const $targetLi = $('#' + targetId);

	if ($targetLi.length) {
        // 팝업 닫기
        closeFloating('floating-layer');
		const $scrollContainer = $('.d-scroll');
        const currentScrollTop = $scrollContainer.scrollTop();
        const targetOffsetTop = $targetLi.position().top; 
        const targetTop = currentScrollTop + targetOffsetTop - 100;
		$scrollContainer.not(':animated').animate({
            scrollTop: targetTop
        }, 500, 'swing');

        setTimeout(function() {
            $targetLi.find('input, select').first().focus();
        }, 300); // 포커싱 인
    }
}
</script>
