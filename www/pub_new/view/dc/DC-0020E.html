<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>가입제안 고객조회</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
</head>
<body>

<!-- 화면 영역 -->
<div class="d-wrap">

	<!-- header 고정영역 -->
	<header>
		<div class="d-head">
			<h1>가입제안 고객조회</h1>
			<button class="lbtn btn-pop-close">닫기</button>
		</div>
	</header>
	<!-- //header -->

	<!-- body_searchBox 고정영역 -->
	<div class="search">
		<ul>
			<li>
				<select class="select" title="상태">
					<option>전체</option>
				</select>
				<input class="inp-wrap" type="text" placeholder="이름을 입력하세요." />
				<button class="sbtn-search" type="submit">검색</button>
			</li>
		</ul>
	</div>

	<!-- body_resultBox 스크롤영역 -->
	<div class="d-cont d-scroll">
		<h2 class="ui-hidden-accessible">검색결과 영역</h2>

		<!-- 검색 전 문구 -->
		<div class="no-data none">검색조건을 입력하고 검색을 진행해 주세요.</div>
		<!-- 검색 후 문구 -->
		<div class="no-data none">검색결과가 없습니다.</div>
		
		<div>
			<div class="result-txt">총 5명이 검색되었습니다.</div>
			<ul class="link-list-st01">
				<li>
					<div class="tit-h2">
						<a class="link-go" href="#">
							<span class="name">홍달수일이삼</span>
							<span class="age ibtn-link">(44/남)</span><!-- 2018-05-15 -->
						</a>
						<p class="tit-h2-con">
							<span class="status-02">가망</span>
						</p>
					</div>
					<article class="link-list-con">
						<ul class="bul-list-st01 col-02">
							<li>
								<span class="stit">동의만료일</span><!-- 2018-05-09 -->
								<span class="scon">2018.02.12</span>
							</li>
							<li>
								<span class="stit">상령일</span>
								<span class="scon">2018.02.12</span><!-- 2018-05-09 -->
							</li>
							<li class="fl-none">
								<span class="stit">직업</span>
								<span class="scon">관리직 및 사무직관리직 </span>
							</li>
							<li class="fl-none">
								<span class="stit">운전</span>
								<span class="scon">자가용(승용차)</span>
							</li>
						</ul>
					</article>
				</li>
				<li>
					<div class="tit-h2">
						<a class="link-go" href="#">
							<span class="name">홍달수일이삼</span>
							<span class="age ibtn-link">(44/남)</span><!-- 2018-05-15 -->
						</a>
						<p class="tit-h2-con">
							<span class="status-02">계약</span><!-- 2018-05-09 -->
						</p>
					</div>
					<article class="link-list-con">
						<ul class="bul-list-st01 col-02">
							<li>
								<span class="stit">동의만료일</span><!-- 2018-05-09 -->
								<span class="scon">2018.02.12</span>
							</li>
							<li>
								<span class="stit">상령일</span>
								<span class="scon">2018.02.12</span><!-- 2018-05-09 -->
							</li>
							<li class="fl-none">
								<span class="stit">직업</span>
								<span class="scon">관리직 및 사무직관리직 및 사무</span>
							</li>
							<li class="fl-none">
								<span class="stit">운전</span>
								<span class="scon">자가용(승용차)</span>
							</li>
						</ul>
					</article>
				</li>
			</ul>
		</div>
	</div>

</div>
<!--// 화면 영역 -->

</body>
</html>
