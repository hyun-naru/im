<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>실손보상 중복가입 조회</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
</head>
<body>

<!-- fullpopup 영역 -->
<div class="fullpop-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="d-head">
			<h1>실손보상 중복가입 조회</h1>
			<button class="lbtn btn-pop-close">닫기</button>
		</div>
	</header>
	<!-- //header -->

	<!-- body_searchBox 고정영역 -->
	<fieldset>
		<legend>검색항목 영역</legend>
		<div class="search">
			<ul>
				<li>
					<label for="inp-1" class="label-txt w70">고객명</label>
					<input id="inp-1" type="text" class="inp-wrap" value="홍길동" />
					<button class="sbtn-search-w">찾기</button>
				</li>
				<li>
					<label for="sel1" class="label-txt w70">조회목적</label>
					<select id="sel1" class="select">
						<option>계약체결(요청)</option>
					</select>
				</li>
			</ul>
		</div>
		<div class="btnArea">
			<button class="lbtn-search" type="submit">검색</button>
		</div>
	</fieldset>

	<!-- body_resultBox 스크롤영역 -->
	<div class="fullpop-cont d-scroll bg-st02">
		<h2 class="ui-hidden-accessible">검색결과 영역</h2>

		<div>
			<div class="result-txt">총 5명이 검색되었습니다.</div>
			<ul class="link-list-st01 dform circle01">
				<li>
					<div class="tit-h2">
						<p class="status">
							<span class="pro-num">5160100021</span>
							<span class="pro-stit">기본형 실손의료비보장보험 무배당 1704(갱신형)</span>
						</p>
						<p class="tit-h2-con">
							<span class="status-02">정상</span>
						</p>
					</div>
					<article class="link-list-con">
						<ul class="bul-list-st01 col-02">
							<li>
								<span class="stit">회사명</span>
								<span class="scon">DGB생명</span>
							</li>
							<li>
								<span class="stit">증권번호</span>
								<span class="scon">00000000000</span>
							</li>
							<li>
								<span class="stit">보험구분</span>
								<span class="scon">실손보험</span>
							</li>
							<li>
								<span class="stit">보험기간</span>
								<span class="scon">10년</span>
							</li>
							<li class="fl-none">
								<span class="stit">의료비특약 총 가입금액</span><!-- 2018-05-09 -->
								<span class="scon">999.999.999원</span>
							</li>
						</ul>
					</article>
				</li>
			</ul>
		</div>
	</div>

	<!-- footer 고정영역 -->
	<footer>
		<div class="fullpop-footer"><!-- 리스트선택시 disabled삭제 -->
			<button class="lbtn btn-st01" >확인</button>
		</div>
	</footer>
	<!-- //footer -->
</div>
<!--// fullpopup 영역 -->

</body>
</html>
