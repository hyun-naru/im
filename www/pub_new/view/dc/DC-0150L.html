<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>계좌변경 신청</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
</head>
<body>

<!-- fullpopup 영역 -->
<div class="fullpop-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="fullpop-head">
			<h1>계좌변경 신청</h1>
			<button class="lbtn btn-pop-close">닫기</button>
		</div>
	</header>
	<!-- header  -->

	<!-- body 스크롤영역 -->
	<div class="fullpop-cont d-scroll bg-st02">
		<div class="cont1">
			<h2 class="h2-st02">계좌변경 내용(초회)</h2>
			<div>
				<ul class="write-st04">
					<li>
						<label>납입방법</label>
						<div class="checkBox-st01">
							<input type="radio" id="ra1_1" name="ra1" /><label for="ra1_1">즉시이체</label>
							<input type="radio" id="ra1_2" name="ra1" /><label for="ra1_2">카드</label>
						</div>
					</li>

					<!-- 즉시이체일 경우 -->
					<li>
						<label for="lab-1">은행명</label>
						<div>
							<input id="lab-1" class="inp-wrap" type="text" disabled />
							<button class="btn-find">찾기</button>
							<!-- <select class="select flex">
								<option>국민은행</option>
							</select> -->
						</div>
					</li>
					<li>
						<label for="lab-2">계좌번호 <span class="label-desc fc-blue">본인 명의의 계좌만 가능합니다</span></label>
						<div>
							<input id="lab-2" class="inp-wrap" type="text" disabled />
							<button class="btn-find">찾기</button>
						</div>
					</li>

					<!-- 카드일 경우 -->
					<li>
						<label for="lab-3">카드번호 <span class="label-desc fc-blue">본인 명의의 카드만 가능합니다</span></label>
						<div>
							<input id="lab-3" class="inp-wrap" type="text" disabled />
							<button class="btn-find">찾기</button>
						</div>
					</li>
					<li><!-- 2018-05-03 / 2018-05-04 -->
						<label for="lab-4">유효기간</label>
						<div>
							<input id="lab-4" class="inp-wrap" type="tel" placeholder="년월 입력" />
							<input type="date" class="sbtn-calendar" title="달력보기" />
						</div>
					</li>
					<li>
						<label for="lab-5">할부기간</label>
						<div>
							<select id="lab-5" class="select">
								<option>일시불</option>
								<option>2개월</option>
								<option>24개월</option>
							</select>
						</div>
					</li>
					<li>
						<label for="lab-7">계속/반환 계좌 변경여부</label>
						<div class="checkBox-st01">
							<input type="radio" id="ra2_1" name="ra2" /><label for="ra2_1">예</label>
							<input type="radio" id="ra2_2" name="ra2" checked /><label for="ra2_2">아니오</label>
						</div>
					</li>
					<!-- 예일 경우 -->
					<li>
						<label for="lab-8">은행명</label>
						<div>
							<input id="lab-8" class="inp-wrap" type="text" disabled />
							<button class="btn-find">찾기</button>
						</div>
					</li>
					<li>
						<label for="lab-9">계좌번호 <span class="label-desc fc-blue">본인 명의의 계좌만 가능합니다</span></label>
						<div>
							<input id="lab-9" class="inp-wrap" type="text" disabled  />
						</div>
					</li>
					<li>
						<label for="lab-10">수금일자</label>
						<div class="checkBox-st01">
							<input type="radio" id="ra3_1" name="ra3" /><label for="ra3_1">1</label>
							<input type="radio" id="ra3_2" name="ra3" /><label for="ra3_2">10</label>
							<input type="radio" id="ra3_3" name="ra3" /><label for="ra3_3">15</label>
							<input type="radio" id="ra3_4" name="ra3" /><label for="ra3_4">20</label>
							<input type="radio" id="ra3_5" name="ra3" /><label for="ra3_5">25</label>
						</div>
					</li>
				</ul>
			</div>

			<div>
				<ul class="bul-list-st01 boxlist">
					<li>계속납입 보험료 및 반환계좌도 위의 입력한 계좌로 진행됩니다.</li>
					<li>본인 명의의 계좌만 가능합니다.</li>
				</ul>
			</div>
		</div>
	</div>

	<!-- footer 고정영역 -->
	<footer>
		<div class="fullpop-footer">
			<button class="lbtn btn-st03" >미리보기</button>
			<button class="lbtn btn-st01" >신청</button>
		</div>
	</footer>
	<!-- //footer -->

</div>
<!--// fullpopup 영역 -->

</body>
</html>
