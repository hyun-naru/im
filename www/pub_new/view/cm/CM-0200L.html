<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />

<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>

<body>

<!-- fullpopup 영역 -->
<div class="fullpop-wrap">

	<div class="fullpop-cont d-scroll bg-st02">

			<table class="tb-data ta-l">
				<caption>익일해약접수 구분 및 내용</caption>
				<thead>
					<tr>
						<th scope="cols" class="w30p">구분</th>

					</tr>
				</thead>
				<tbody>
					<tr>
						<th scope="rows">증권번호</th>
						<td id="CM-0200L_PLYNO">2001020208</td>
					</tr>
					<tr>
						<th scope="rows">기준일자</th>
						<td id="CM-0200L_DFR_YMD">2018.03.05</td>
					</tr>
					<tr>
						<th scope="rows">계약자명</th>
						<td id="CM-0200L_POHD_CSNO">홍길동</td>

						<th scope="rows">피보험자명</th>

					</tr>
					</tr>
					<tr>
						<th scope="rows">계약일자</th>
						<td id="CM-0200L_CTYMD">2018.03.05</td>
					</tr>
					<tr>
						<th scope="rows">상품명</th>
						<td id="CM-0200L_PRD_NAM">프리미엄건강보험 무배당</td>
					</tr>
					<tr>
						<th scope="rows">보험료</th>
						<td id="CM-0200L_GSPRE">150,000원</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>

	<!-- footer 고정영역 -->
	<footer>
		<div class="fullpop-footer">
			<button class="lbtn btn-st01" id="CM-0200L_closePop">확인</button>
		</div>
	</footer>
	<!-- //footer -->

</div>
<!--// fullpopup 영역 -->

</body>
</html>
