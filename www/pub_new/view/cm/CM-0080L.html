<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>신계약 현황 상세</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>

<body>

<!-- fullpopup 영역 -->
<div class="fullpop-wrap">

	<div class="fullpop-cont d-scroll bg-st02">
		<div class="cont1">
			<table class="tb-data ta-l">
				<caption>계약구분 및 내용</caption>
				<thead>
					<tr>
						<th scope="cols" class="w40p">구분</th>

				</thead>

					<tr>
						<th scope="rows">증권번호</th>

					</tr>
					<tr>
						<th scope="rows">상품군</th>
						<td id="CM-0080L_PRD_GRP_NAM">종신</td>
					</tr>
					<tr>
						<th scope="rows">상품명</th>
						<td id="CM-0080L_PRDNM">리치플랜S유니버셜종신보험(무)</td>
					</tr>
					<tr>
						<th scope="rows">환산P</th>
						<td id="CM-0080L_CONV_PREM">210</td>
					</tr>
					<tr>
						<th scope="rows">계약자</th>
						<td id="CM-0080L_POHD_NAM">김배우</td>
					</tr>
					<tr>
						<th scope="rows">피보험자</th>
						<td id="CM-0080L_MAIPSN_CS_NAM">김배우</td>
					</tr>
					<tr>
						<th scope="rows">주계약금액</th>

					</tr>
					<tr>
						<th scope="rows">납입주기</th>
						<td id="CM-0080L_MAI_PYCYC_NAM">월납</td>
					</tr>
					<tr>
						<th scope="rows">합계보험료</th>
						<td id="CM-0080L_SMPRM">200,000원</td>
					</tr>
					<tr>
						<th scope="rows">계약상태</th>
						<td id="CM-0080L_CTR_ST_NAM">정상</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>

	<!-- footer 고정영역 -->
	<footer>
		<div class="fullpop-footer">
			<button class="lbtn btn-st01" id="CM-0080L_closePop">확인</button>
		</div>
	</footer>
	<!-- //footer -->

</div>
<!--// fullpopup 영역 -->

</body>
</html>
