<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>선심사</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
<script type="text/javascript" src="../../../js/libs/jquery/jquery-1.11.0.min.js"></script>
<script type="text/javascript" src="../../../js/libs/ui.js"></script>
</head>
<body>

<!-- 화면 영역 -->
<div class="d-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="d-head">
			<h1>선심사</h1>
			<button class="lbtn btn-back">이전페이지 이동</button>
			<button class="rbtn btn-view-side">전체메뉴</button>
		</div>
	</header>
	<!-- //header -->
	
	<!-- d-step 10.26 위치 이동 -->
	<div class="d-step">
		<h2>고객 선택</h2>
		<p class="d-step-status">
			<span class="on">1</span>
			<span>2</span>
			<span>3</span>
		</p>
	</div>
	<!-- //d-step  -->

	<!-- body 스크롤영역 -->
	<div class="d-scroll">
		<div class="d-cont">
			<div class="search">
				<ul>
					<li>
						<label for="customer">고객</label>
						<input type="text" class="inp-wrap" id="customer" value="홍길동(46세,남)">
						<button class="sbtn-search-g">검색</button>
					</li>
				</ul>
			</div>

			<div class="contract-info">
				<div class="cont3">
					<div class="tit-box flex-box">
						<h3 class="h3-tit-st01">가입제안 정보</h3>
						<div class="r-box">
							<button type="button" class="sbtn-bdr-1 bdr-st06"><span>이력선택</span></button>
							<button type="button" class="sbtn-bdr-1 bdr-st03"><span>바로가기</span></button>
						</div>
					</div>
					<dl class="dl-list">
						<dt>상품명</dt>
						<dd class="border">
							<div>
								<span class="stit">마음 든든 유니버셜 종신보험(무)1940 (보증비용부과형)_가산형_기본형</span>
							</div>
						</dd>
					</dl>
					<dl class="dl-list">
						<dt>일시</dt>
						<dd class="border">
							<div>
								<span class="stit">2020.03.25</span>
							</div>
						</dd>
					</dl>
					<ul class="bul-list-st02 no-gap">
						<li>가입제안 이력은 선택하지 않고도 선심사 진행이 가능합니다.</li>
						<li>가입제안 이력이 있는 경우에는 주계약/특약에 대한 심사가 더 정확히 진행됩니다.</li>
					</ul>
				</div>
				<div class="cont3">
					<div class="tit-box flex-box">
						<h3 class="h3-tit-st01">가입제안</h3>
						<div class="r-box">
							<button type="button" class="sbtn-bdr-1 bdr-st03"><span>바로가기</span></button>
						</div>
					</div>
				</div>
			</div>

			<!-- 고객정보 입력 -->
			<div class="contract-info none">
				<div class="cont3">
					<div class="tit-box">
						<h3 class="h3-tit-st01">고객정보를 입력해주세요.</h3>
					</div>
					<ul class="write-st04 mab-n">
						<li>
							<label for="info1-1">성명</label>
							<div>
								<input type="text" class="inp-wrap" id="info1-1" value="홍길동">
							</div>
						</li>
						<li>
							<label for="info1-2">주민등록번호</label>
							<div>
								<input type="number" class="inp-wrap" id="info1-2" value="801122">
								<span class="dash">~</span>
								<input type="text" class="inp-wrap" value="1******">
							</div>
						</li>
					</ul>
				</div>
			</div>
			<!-- //고객정보 입력 -->
		</div>
	</div>
	<!-- //body 스크롤영역 -->

	<!-- footer 고정영역 -->
	<footer>
		<div class="d-footer">
			<button class="lbtn btn-st22 flex0 w120">이전</button>
			<button class="lbtn btn-st04">다음</button>
		</div>
	</footer>
	<!-- //footer 고정영역 -->
</div>
<!--//화면 영역 -->
</body>
</html>
