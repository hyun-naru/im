<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>Self UnderWriting</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
<script type="text/javascript" src="../../../js/libs/jquery/jquery-1.11.0.min.js"></script>
<script type="text/javascript" src="../../../js/libs/ui.js"></script>
</head>
<body>

<!-- 화면 영역 -->
<div class="d-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="d-head">
			<h1>Self UnderWriting</h1>
			<button class="lbtn btn-back">이전페이지 이동</button>
			<button class="rbtn btn-view-side">전체메뉴</button>
		</div>
	</header>
	<!-- //header -->
	
	<!-- d-step 10.26 위치 이동 -->
	<div class="d-step">
		<h2>고객 & 가설 선택</h2>
		<p class="d-step-status">
			<span class="on">1</span>
			<span>2</span>
			<span>3</span>
			<span>4</span>
		</p>
	</div>
	<!-- //d-step  -->

	<!-- body 스크롤영역 -->
	<div class="d-scroll">
		<div class="d-cont">
			<div class="search">
				<ul>
					<li>
						<label for="self-uw01">고객유형</label>
						<div class="checkBox-st01">
							<input type="radio" name="self-uw01" id="self-uw01-01" checked=""><label for="self-uw01-01">실명고객</label>
							<input type="radio" name="self-uw01" id="self-uw01-02"><label for="self-uw01-02">가상고객</label>
						</div>
					</li>
					<li><!-- 실명고객 -->
						<label for="self-uw02">고객</label>
						<input type="text" class="inp-wrap" id="self-uw02" value="홍길동(46세,남)">
						<button class="sbtn-search-g">검색</button>
					</li>
					<!-- 가상고객 -->
					<li class="none">
						<label for="self-uw03">나이</label>
						<input type="text" class="inp-wrap" id="self-uw03" value="33">
					</li>
					<li class="none">
						<label for="self-uw04">성별</label>
						<div class="checkBox-st01">
							<input type="radio" name="self-uw04" id="self-uw04-01" checked=""><label for="self-uw04-01">남</label>
							<input type="radio" name="self-uw04" id="self-uw04-02"><label for="self-uw04-02">여</label>
						</div>
					</li>
				</ul>
			</div>

			<div class="contract-info">
				<div class="cont3">
					<div class="tit-box flex-box">
						<h3 class="h3-tit-st01">가입제안 정보</h3>
						<div class="r-box">
							<button type="button" class="sbtn-bdr-1 bdr-st06"><span>이력선택</span></button>
							<button type="button" class="sbtn-bdr-1 bdr-st03"><span>바로가기</span></button>
						</div>
					</div>
					<dl class="dl-list">
						<dt>상품명</dt>
						<dd class="border">
							<div>
								<span class="stit">마음 든든 유니버셜 종신보험(무)1940 (보증비용부과형)_가산형_기본형</span>
							</div>
						</dd>
					</dl>
					<dl class="dl-list">
						<dt>일시</dt>
						<dd class="border">
							<div>
								<span class="stit">2020.03.25</span>
							</div>
						</dd>
					</dl>
				</div>
				<div class="cont3">
					<div class="tit-box flex-box">
						<h3 class="h3-tit-st01">가입제안</h3>
						<div class="r-box">
							<button type="button" class="sbtn-bdr-1 bdr-st03"><span>바로가기</span></button>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<!-- //body 스크롤영역 -->

	<!-- footer 고정영역 -->
	<footer>
		<div class="d-footer">
			<button class="lbtn btn-st04">다음</button>
		</div>
	</footer>
	<!-- //footer 고정영역 -->
</div>
<!--//화면 영역 -->
</body>
</html>
