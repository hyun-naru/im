<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>Self UnderWriting</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
<script type="text/javascript" src="../../../js/libs/jquery/jquery-1.11.0.min.js"></script>
<script type="text/javascript" src="../../../js/libs/ui.js"></script>
</head>
<body>

<!-- 화면 영역 -->
<div class="d-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="d-head">
			<h1>Self UnderWriting</h1>
			<button class="lbtn btn-back">이전페이지 이동</button>
			<button class="rbtn btn-view-side">전체메뉴</button>
		</div>
	</header>
	<!-- //header -->

	<!-- body 스크롤영역 -->
	<div class="d-cont d-scroll bg-st04">
		<div class="self-uw-wrap">
			<div class="top-txt">
				<em>홍길동</em> FC님,<br>
				이제 청약 전 고객님과 함께 셀프 심사를 진행해보세요.<!-- 9.17 수정 -->
			</div>
			<div class="self-uw-guide">
				<div class="guide-txt">
					Self UnderWriting 진행하기 전,<br>
					중요사항을 확인하고 체크(<span class="ico-chk03"></span>)해주세요.
				</div>
				<ul class="chk-list-st01 dform square02">
					<li><input type="checkbox" id="la1-1"><label for="la1-1">입력하신 정보와 실제 정보가 다를 경우에는<br><em>심사결과가 달라질 수 있습니다.</em></label></li>
					<li><input type="checkbox" id="la1-2"><label for="la1-2"><em>(고혈압을 제외한)</em>10대 질병과 관련하여 의료행위를 받은 사실이 있다면 Self Underwiting의 진행이 불가합니다.</label>
						<div class="checkBox-st01 col-03 full">
							<ul>
								<li><input type="checkbox" name="self-uw01" id="self-uw01-01" disabled><label for="self-uw01-01">고혈압</label></li>
								<li><input type="checkbox" name="self-uw01" id="self-uw01-02"><label for="self-uw01-02">암</label></li>
								<li><input type="checkbox" name="self-uw01" id="self-uw01-03"><label for="self-uw01-03">심근경색</label></li>
								<li><input type="checkbox" name="self-uw01" id="self-uw01-04"><label for="self-uw01-04">간경화증</label></li>
								<li><input type="checkbox" name="self-uw01" id="self-uw01-05"><label for="self-uw01-05">당뇨병</label></li>
								<li><input type="checkbox" name="self-uw01" id="self-uw01-06"><label for="self-uw01-06">백혈벙</label></li>
								<li><input type="checkbox" name="self-uw01" id="self-uw01-07"><label for="self-uw01-07">협심증</label></li>
								<li><input type="checkbox" name="self-uw01" id="self-uw01-08"><label for="self-uw01-08">심장판막증</label></li>
								<li><input type="checkbox" name="self-uw01" id="self-uw01-09"><label for="self-uw01-09">뇌졸중증</label></li>
								<li><input type="checkbox" name="self-uw01" id="self-uw01-10"><label for="self-uw01-10">에이즈</label></li>
							</ul>
						</div>
					</li>
				</ul>
			</div>
		</div>
	</div>
	<!-- //body 스크롤영역 -->

	<!-- footer 고정영역 -->
	<footer>
		<div class="d-footer">
			<button class="lbtn btn-st04">위 내용을 확인하였습니다.</button>
		</div>
	</footer>
	<!-- //footer 고정영역 -->
</div>
<!--//화면 영역 -->
</body>
</html>
