<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>선심사</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
<script type="text/javascript" src="../../../js/libs/jquery/jquery-1.11.0.min.js"></script>
<script type="text/javascript" src="../../../js/libs/ui.js"></script>
</head>
<body>

<!-- 화면 영역 -->
<div class="d-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="d-head">
			<h1>선심사</h1>
			<button class="rbtn btn-view-side">전체메뉴</button>
		</div>
	</header>
	<!-- //header -->

	<!-- body 스크롤영역 -->
	<div class="d-scroll">
		<div class="d-cont bg-st01">
			<div class="top-notice">
				<p class="txt">이제 <em>선심사</em>를 통해서 청약 전에 심사결과를<br> 확인 할 수 있습니다.</p>
			</div>
			<div class="cont3">
				<h2 class="h3-tit-ico01">진행 프로세스</h2>
				<ol class="process-step">
					<li>
						<div class="item">
							<span class="no">01</span>
							<div class="scon">고객조회</div>
						</div>
					</li>
					<li>
						<div class="item">
							<span class="no">02</span>
							<div class="scon">가입제안 이력 선택(필요한 경우만 진행)</div>
						</div>
					</li>
					<li>
						<div class="item">
							<span class="no">03</span>
							<div class="scon">고지입력</div>
						</div>
					</li>
					<li>
						<div class="item">
							<span class="no">04</span>
							<div class="scon">추가서류 등록(사진촬영 or 파일첨부)</div>
						</div>
					</li>
					<li>
						<div class="item">
							<span class="no">05</span>
							<div class="scon">완료(선심사 진행현황에서 조회 가능)</div>
						</div>
					</li>
				</ol>

				<div class="sign-cont align-c">
					<p class="stxt">
						<em>선심사</em>는 사전에 개괄적인 심사를 진행하는 것으로<br>
						<em>입력하신 정보가 실제정보와 다를 경우</em> 심사 결과가<br>
						변경될 수 있습니다.
					</p>
					<div class="sign-chk-btn">
						<input type="checkbox" id="sign-chk">
						<label for="sign-chk">네,확인하였습니다.</label>
					</div>
				</div>
			</div>
		</div>
	</div>
	<!-- //body 스크롤영역 -->

	<!-- footer 고정영역 -->
	<footer>
		<div class="d-footer">
			<button class="lbtn btn-st04">선심사 시작</button>
		</div>
	</footer>
	<!-- //footer 고정영역 -->
</div>
<!--//화면 영역 -->
</body>
</html>
