<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>청약서작성(계약자)</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
<script type="text/javascript" src="../../../js/libs/jquery/jquery-1.11.0.min.js"></script>
<script type="text/javascript" src="../../../js/libs/ui.js"></script>
</head>
<body>

<!-- 화면 영역 -->
<div class="d-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="d-head">
			<h1>청약서작성(계약자)</h1>
			<button class="lbtn btn-back">이전페이지 이동</button>
			<button class="rbtn btn-view-side">전체메뉴</button>
		</div>
	</header>
	<!-- //header -->
	
	<!-- d-step 10.26 위치 이동 -->
	<div class="d-step">
		<h2>청약서류 작성</h2>
		<p class="d-step-status">
			<span class="on">1</span>
			<span class="on">2</span>
			<span class="on">3</span>
			<span class="on">4</span>
			<span>5</span>
		</p>
	</div>
	<!-- //d-step  -->

	<!-- body 스크롤영역 -->
	<div class="d-scroll">
		<div class="d-cont">
			<div class="title-step">
				<h3 class="tit">개인고객 거래 확인서<span class="step">(<em>1</em>/2)</span></h3>
			</div>
			<div class="subscribe-wrap">
				<div class="top-info">
					<p class="ico-txt-st01">청약문서를 확인하신 후, 아래의 내용을 작성해주세요.</p><!-- 10.5 수정 -->
				</div>
				<div class="subscribe-cont">
					<dl class="dl-list">
						<dt>청약문서 확인</dt>
						<dd>
							<div class="dform square02">
								<input type="checkbox" id="chk1" checked>
								<label for="chk1" class="stit">개인고객 거래 확인서</label><!-- 10.5 수정 -->
							</div>
							<span class="chk-complt">확인완료</span><!-- 문서확인 완료후 노출 -->
						</dd>
					</dl>
				</div>

				<!-- 10.05 가필영역삭제 
				<div class="subscribe-cont">
					<div class="gapil-box">
						보험모집자 (<span class="gapil"><label>김태희</label><input type="text" class="ipt"></span>)(으)로부터 상품설명서에 대한 내용을 교부받아 
						(<span class="gapil"><label>설명듣고 이해</label><input type="text" class="ipt"></span>)하였습니다. 또한 본인이 가입하는 보험계약의 예금자보호 여부 및 보호한도(해지환급금(또는 만기시 보험금이나 사고보험금)에 기타지급금을 합하여 1인당 5천만원)에 대하여 설명듣고 이해하였음을 확인합니다.
						<div class="dpop-layer2 gapil-layer">
							<div class="dpop-container">
								<div class="gapil-cont">
									<span class="gapil"><label>김태희</label><input type="text" class="ipt"></span>
									<button type="button" class="sbtn-5 btn-st01">확인</button>
								</div>
							</div>
						</div>
					</div>
				</div>
				-->
				
				<div class="subscribe-cont">
					<ul class="bul-list-st02">
						<li>고객확인은 [특정금융거래정보의 보고 및 이용 등에 관한 법률]에 따라 수행하며, 제공하신 정보는 관련법에 의거하여 엄격히 관리됩니다.</li>
						<li>고객확인 정보 제공이 거부되거나 신원확인이 불가능할 경우에는 거래가 제한되거나 거절될 수 있습니다.</li>
					</ul>
				</div>
			</div>
		</div>
	</div>
	<!-- //body 스크롤영역 -->

	<!-- footer 고정영역 -->
	<footer>
		<div class="d-footer">
			<button class="lbtn btn-st22 flex0 w120">이전</button>
			<button class="lbtn btn-st04">다음</button>
		</div>
	</footer>
	<!-- //footer 고정영역 -->
</div>
<!--//화면 영역 -->
</body>
</html>
