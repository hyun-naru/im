<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>FC 모바일청약 진행단계 상세</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
<script type="text/javascript" src="../../../js/libs/jquery/jquery-1.11.0.min.js"></script>
<script type="text/javascript" src="../../../js/libs/ui.js"></script>
</head>
<body>

<!-- fullpopup 영역 -->
<div class="fullpop-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="fullpop-head">
			<h1>모바일청약(FC) 진행단계 상세</h1><!-- 9.25 수정 -->
			<button class="lbtn btn-pop-close">닫기</button>
		</div>
	</header>
	<!-- //header -->

	<!-- body 스크롤영역 -->
	<div class="d-scroll">
		<div class="fullpop-cont">
			<div class="fc-ing-step-info">
				<ul class="list">
					<li class="comlpt">
						<div class="item">
							<div class="stit"><!-- 9.25 수정 -->
								피보험자서면동의서 등록
							</div>
							<div class="scon">
								<span class="ico-exc">불필요</span>
							</div>
						</div>
					</li>
					<li class="comlpt">
						<div class="item">
							<div class="stit"><!-- 9.25 수정 -->
								모집경위확인서 작성
							</div>
							<div class="scon">
								<span class="ico-complt">작성완료</span>
							</div>
						</div>
					</li>
					<li class="ing ing-st01">
						<div class="item">
							<div class="stit">
								청약확정
							</div>
							<div class="scon">
								<span class="ico-exc">미확정</span>
							</div>
						</div>
						<!-- 상태값
							ing-st01 : 미확정, 미입금, 미등록
							ing-st02 : 등록완료, 작성완료, 확정완료, 입금완료
						-->
					</li>
					<li>
						<div class="item">
							<div class="stit">
								초회보험료 입금
							</div>
							<div class="scon">
								<span class="ico-exc">미입금</span>
							</div>
						</div>
					</li>
				</ul>
			</div>
		</div>
	</div>
	<!-- //body 스크롤영역 -->

	<!-- footer 고정영역 -->
	<footer>
		<div class="fullpop-footer">
			<button class="lbtn btn-st04">확인</button>
		</div>
	</footer>
	<!-- //footer -->

</div>
<!--// fullpopup 영역 -->

</body>
</html>
