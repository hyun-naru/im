<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>설계사 서명</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
<script type="text/javascript" src="../../../js/libs/jquery/jquery-1.11.0.min.js"></script>
<script type="text/javascript" src="../../../js/libs/ui.js"></script>
</head>
<body>

<!-- 화면 영역 -->
<div class="d-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="d-head">
			<h1>FC 서명</h1>
			<button class="lbtn btn-back">이전페이지 이동</button>
			<button class="rbtn btn-view-side">전체메뉴</button>
		</div>
	</header>
	<!-- //header -->

	<!-- body 스크롤영역 -->
	<div class="d-scroll">
		<div class="d-cont">

			<div class="sign-cont">
				<ul class="bul-list-st02"><!-- 9.15 수정 -->
					<li>보험계약 체결과 관련하여 계약자와 직접 대면하여 상품 및 계약내용에 대해 충실히 설명하였고, 이에 대한 고객님의 동의가 있었기에 청약을 진행합니다.</li>
				</ul>
				<div class="sign-chk-btn">
					<input type="checkbox" id="sign-chk">
					<label for="sign-chk">동의합니다.</label>
				</div>
			</div>

			<div class="cont1 bg-st01">
				<div class="sign-area">
					<span class="sign-tit">(서명/날인/SIGN)</span>
					<div class="sign-box">
						
					</div>
					<button type="button" class="btn-reset"><span>초기화</span></button>
				</div>
			</div>
		</div>
	</div>
	<!-- //body 스크롤영역 -->

	<!-- footer 고정영역 -->
	<footer>
		<div class="d-footer">
			<button class="lbtn btn-st22 flex0 w120">이전</button>
			<button class="lbtn btn-st04" disabled>전자청약서 작성</button>
		</div>
	</footer>
	<!-- //footer 고정영역 -->
</div>
<!--//화면 영역 -->
</body>
</html>
