<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>청약서작성(계약자)</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
<script type="text/javascript" src="../../../js/libs/jquery/jquery-1.11.0.min.js"></script>
<script type="text/javascript" src="../../../js/libs/ui.js"></script>
</head>
<body>

<!-- 화면 영역 -->
<div class="d-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="d-head">
			<h1>청약서작성(계약자)</h1>
			<button class="lbtn btn-back">이전페이지 이동</button>
			<button class="rbtn btn-view-side">전체메뉴</button>
		</div>
	</header>
	<!-- //header -->

	<!-- d-step 10.26 위치 이동 -->
	<div class="d-step">
		<h2>청약서류 작성</h2>
		<p class="d-step-status">
			<span class="on">1</span>
			<span class="on">2</span>
			<span class="on">3</span>
			<span class="on">4</span>
			<span>5</span>
		</p>
	</div>
	<!-- //d-step  -->

	<!-- body 스크롤영역 -->
	<div class="d-scroll">
		<div class="d-cont">
			<div class="title-step">
				<h3 class="tit">개인고객 거래 확인서<span class="step">(<em>2</em>/2)</span></h3><!-- 10.5 추가 -->
				<button type="button" class="sbtn-bdr-1 bdr-st01"><span>서명위치</span></button>
			</div>

			<div class="cont1 bg-st01">
				<div class="sign-area">
					<span class="sign-tit">(서명/날인/SIGN)</span>
					<div class="sign-box">
						
					</div>
					<button type="button" class="btn-reset"><span>초기화</span></button>
				</div>
				
				<!-- 10.5 추가 -->
				<h4 class="list-tit02 mat_40">[개인고객 거래 확인서 주의사항]</h4>
				<ol class="ol-list-st02">
					<li>1. 개인고객 거래 확인서 출력물 中 수기 작성은 "①신원확인증, ②발급일자/운전면허번호, ③실제소유자"만 가능합니다.<br>(출력물 수정불가 → 출력물과 전산값의 불일치 차단)</li>
					<li>2. 개인고객 거래 확인서 출력물 임의 수정시 KYC 미완료로 인정됨으로 재출력 후 고객 서명을 진행해주십시오.</li>
				</ol>
				<!-- //10.5 추가 -->
			</div>
		</div>
	</div>
	<!-- //body 스크롤영역 -->

	<!-- footer 고정영역 -->
	<footer>
		<div class="d-footer">
			<button class="lbtn btn-st22 flex0 w120">이전</button>
			<button class="lbtn btn-st04" disabled>다음</button>
		</div>
	</footer>
	<!-- //footer 고정영역 -->
</div>
<!--//화면 영역 -->
</body>
</html>
