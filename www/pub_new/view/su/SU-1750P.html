<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />

<title>계좌변경 신청</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>

</head>
<body>

<!-- fullpopup 영역 -->
<div class="fullpop-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="fullpop-head">
			<h1>계좌변경 신청</h1>
			<button class="lbtn btn-pop-close">닫기</button>
		</div>
	</header>
	<!-- //header -->

	<!-- body 스크롤영역 -->
	<div class="d-scroll">
		<div class="fullpop-cont">
			<div class="pop-cont-head">
				<h2 class="tit">계좌변경 내용(초회)</h2>
			</div>
			<div class="cont3"><!-- 9.24 수정 -->
				<ul class="write-st04 mab-n"><!-- 9.25 수정 -->
					<li><!-- 9.24 수정 -->
						<label for="lab-0">납입방법</label>
						<div class="checkBox-st01 pab_10">
							<input type="radio" id="lab-0" name="way" checked disabled><label for="lab-0">즉시이체</label>
						</div>
					</li>
					<li class="flex-type"><!-- 9.25 수정 -->
						<label for="lab-1">은행명</label>
						<div>
							<input type="text" id="lab-1" class="inp-wrap" value="은행은행" disabled>
							<button class="sbtn-search-g">찾기</button>
						</div>
					</li>
					<li class="flex-type"><!-- 9.25 수정 -->
						<label for="lab-2">계좌번호</label>
						<div class=" pab_10"><!-- 9.25 수정 -->
							<input type="text" id="lab-2" class="inp-wrap" value="333-444-555-666666" disabled>
						</div>
					</li>
				</ul>
				<p class="ico-txt-st01">본인명의의 계좌만 가능합니다.</p>
				
				<div class="box-line mat_40"><!-- 9.18 추가 -->
					<ul class="bul-list-st02">
						<li>계속납입 보험료 및 반환계좌도 위의 입력한 계좌로 진행됩니다.</li>
						<li>본인명의의 계좌만 가능합니다.</li>
					</ul>
				</div>
				
				<div class="box-line mat_40"><!-- 9.18 추가 -->
					<ol class="ol-list-st02">
						<li>
							<span class="no">1.</span> 본인인증 후 최초 호면 진입시에는 청약시 입력했던 계좌정보가 화면에 보여짐
						</li>
						<li>
							<span class="no">2.</span> 돋보기를 선택하여 변경하고자 하는 계좌정보로 변경 진행
						</li>
						<li>
							<span class="no">3.</span> 변경된 계좌정보가 화면에 반영되면
						</li>
						<li>
							<span class="no">4.</span> "신청서 작성"버튼 클릭<br>(신청서 미리보기 &amp; 서명 진행 단계임)
						</li>
					</ol>
				</div>
			</div>
		</div>
	</div>
	<!-- //body 스크롤영역 -->
	
	<!-- footer 고정영역 -->
	<footer>
		<div class="fullpop-footer">
			<button class="lbtn btn-st11">신청서 작성</button><!-- 9.25 수정 -->
			<button class="lbtn btn-st04" disabled>신청</button>
		</div>
	</footer>
	<!-- //footer -->
</div>

</html>
