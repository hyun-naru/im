<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>청약정보입력</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
<script type="text/javascript" src="../../../js/libs/jquery/jquery-1.11.0.min.js"></script>
<script type="text/javascript" src="../../../js/libs/ui.js"></script>
</head>
<body>

<!-- 화면 영역 -->
<div class="d-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="d-head">
			<h1>청약정보입력</h1>
			<button class="lbtn btn-back">이전페이지 이동</button>
			<button class="rbtn btn-view-side">전체메뉴</button>
		</div>
	</header>
	<!-- //header -->

	<!-- d-step 10.26 위치 이동 -->
	<div class="d-step">
		<h2>우편물/증권/약관/부본 수령정보</h2><!-- 9.15 수정 -->
		<p class="d-step-status">
			<span class="on">1</span>
			<span class="on">2</span>
			<span class="on">3</span>
			<span>4</span>
			<span>5</span>
			<span>6</span>
		</p>
	</div>
	<!-- //d-step  -->

	<!-- body 스크롤영역 -->
	<div class="d-scroll">
		<div class="d-cont">
			
			<div class="contract-insure">
				<ul class="toggle">
					<li>
						<div class="toggle-header">
							<div class="title">
								마음 든든 유니버셜 매월생활비 주는 암보험(무) 1511[갱신형] 보증비용 부과
							</div>
							<button type="button" class="btn-toggle">더보기</button>
						</div>
						<div class="toggle-con">
							<div class="cont">
								<ul class="data-list-st01">
									<li>
										<span class="stit">월납기준보험료</span>
										<span class="scon">1,200,000원</span>
									</li>
									<li>
										<span class="stit">할인후 보험료</span>
										<span class="scon">1,200,000원</span>
									</li>
								</ul>
							</div>
						</div>
					</li>
				</ul>
			</div>
			
			<div class="contract-info">
				<div class="cont3">
					<!-- 9.15 삭제
					<div class="tit-box">
						<h3 class="h3-tit-st01">우편물/증권/약관/부본 수령정보</h3>	
					</div>
					-->
					<ul class="write-st02">
						<li>
							<label class="w90" for="la2-1">우편물수령</label>
							<div class="checkBox-st01">
								<input id="ra2-1-1" type="radio" name="ra2-1" checked><label for="ra2-1-1">자택</label>
								<input id="ra2-1-2" type="radio" name="ra2-1"><label for="ra2-1-2">직장</label>
							</div>
						</li>
						<li>
							<label for="la2-6">주소</label>
							<div>
								<input readonly id="lab4" class="inp-wrap" type="tel" value="03367">
								<button class="sbtn-search-g">검색</button>
							</div>
							<div><input readonly class="inp-wrap" type="text" value="서울 은평구 불광동(불광1동)"></div>
							<div><input readonly class="inp-wrap" type="text" value="건물명 국립환경연구원"></div>
						</li>
						<li>
							<label for="la2-3">증권수령</label>
							<div class="checkBox-st01">
								<input id="la2-3-1" type="radio" name="ra2-3" checked><label for="la2-3-1">모바일</label>
								<input id="la2-3-2" type="radio" name="ra2-3"><label for="la2-3-2">이메일</label>
								<input id="la2-3-3" type="radio" name="ra2-3"><label for="la2-3-3">방문수령</label>
							</div>
						</li>
						<li>
							<label for="lab2-5">약관수령</label>
							<div class="checkBox-st01">
								<input id="ra2-5-1" type="radio" name="ra2-5" checked><label for="ra2-5-1">모바일</label>
								<input id="ra2-5-2" type="radio" name="ra2-5"><label for="ra2-5-2">이메일</label>
								<input id="ra2-5-3" type="radio" name="ra2-5"><label for="ra2-5-3">종이</label>
							</div>
						</li>
						<li>
							<label for="lab2-6">부본수령</label>
							<div class="checkBox-st01">
								<input id="ra2-6-1" type="checkbox" name="ra2-6" checked><label for="ra2-6-1">모바일</label>
							</div>
						</li>
						<!-- 삭제
						<li class="pdb-n">
							<label class="w90" for="la2-4">이메일</label>
							<div>
								<input id="la2-4" class="inp-wrap " type="email">
								<span class="dash">@</span>
								<select class="select flex w100p">
									<option>직접입력</option>
								</select>
							</div>
							<div>
								<input class="inp-wrap" type="email">
								<button class="sbtn-5 btn-st02">적용</button>
							</div>
						</li>
						-->
						<li class="pdb-n">
							<label class="w90" for="la2-4">이메일</label>
							<div class="text-sm-07">
								test@text.com
							</div>
						</li>
						<!--
						<li class="pdb-n">
							<label class="w90" for="la2-4">이메일</label>
							<div class="text-sm-07">
								이메일주소가 없습니다. 고객정보수정 후 가능합니다.
							</div>
						</li>
						-->
					</ul>
					<div class="notice-txt align-l pal_n">
						<p class="icoTxt">이메일 주소가 등록된 고객은 이메일 자료(약관,부본)도 함께 받아보실 수 있습니다.</p>
					</div>
				</div>
			</div>
		</div>
	</div>
	<!-- //body 스크롤영역 -->

	<!-- footer 고정영역 -->
	<footer>
		<div class="d-footer">
			<button class="lbtn btn-st22 flex0 w120">이전</button>
			<button class="lbtn btn-st04">다음</button>
		</div>
	</footer>
	<!-- //footer 고정영역 -->
</div>
<!--//화면 영역 -->
</body>
</html>
