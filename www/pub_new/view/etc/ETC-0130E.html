<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>전자FAX번호 발급신청</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
</head>
<body>

<!-- 화면 영역 -->
<div class="d-wrap">
	<!-- header 고정영역 -->
	<header>
		<div class="d-head">
			<h1>고객등록</h1>
			<button class="lbtn btn-pop-close">닫기</button>
		</div>
	</header>
	<!-- //header -->

	<!-- body_resultBox 스크롤영역 -->
	<div class="d-cont d-scroll bg-st02">
		<div class="cont1">
			<div class="h2-group">
				<h2 class="h2-st03">신청자정보</h2>
			</div>
			<ul class="write-st05">
				<li>
					<label for="lab1" class="label-txt">모집점포</label>
					<div>
						<input class="inp-wrap" type="text" disabled id="brofcNam"/>
					</div>
				</li>
				<li>
					<label for="lab2" class="label-txt">모집자</label>
					<div class="dform circle01">
						<input class="inp-wrap" placeholder="이름을 입력하세요." type="text" id="empNam" disabled />
					</div>
				</li>
				<li>
					<label for="lab3" class="label-txt">휴대폰번호
						<span class="label-desc">휴대번호로 안내문자가 발송됩니다.</span><!-- 2018-05-15 -->
					</label>
					<div>
						<input class="inp-wrap" type="tel" id="empTel" phone/>
					</div>
				</li>
			</ul>
		</div>
		<div class="cont1">
			<div class="h2-group">
				<h2 class="h2-st03">증권번호를 입력해주세요.</h2>
			</div>
			<ul class="write-st05">
				<li>
					<label for="plyno" class="label-txt">증권번호</label>
					<div>
						<input id="plyno" class="inp-wrap" type="tel"/>
					</div>
				</li>
			</ul>
		</div>
	</div>
	<input type="hidden" id="brcd"/>
	<input type="hidden" id="empno"/>

	<!-- footer 고정영역 -->
	<footer>
		<div class="d-footer">
			<button class="lbtn btn-st01">신청</button>
		</div>
	</footer>
	<!-- //footer -->

</div>
<!--// 화면 영역 -->

</body>
</html>
