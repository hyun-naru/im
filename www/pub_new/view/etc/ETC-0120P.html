<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>My자료</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
</head>
<body>

<!-- fullpopup 영역 -->
<div class="fullpop-wrap">

	<!-- header 고정영역 -->
	<header>
		<div class="fullpop-head">
			<h1>My자료</h1>
			<button class="lbtn btn-pop-close">닫기</button>
		</div>
	</header>
	<!-- //header -->


	<!-- body_tab 고정영역 -->
	<div>
		<ul class="tab col-4" data-id="tabDepth_1">
			<li><button data-code="10">상품안내장</button></li>
			<li><button data-code="20">인포슈랑스</button></li>
			<li><button data-code="30">니즈자료</button></li>
			<li><button data-code="40">기타</button></li>
		</ul>
	</div>


	<!-- body_resultBox 스크롤영역 -->
	<div class="d-cont d-scroll bg-st02">
		<div class="cont1">
			<ul class="stab" data-id="tabDepth_2">
				<li class="on"><button>종신/정기</button></li>
				<li><button>변액</button></li>
				<li><button>건강/간병</button></li>
				<li><button>저축/연금</button></li>
			</ul>

			<div class="myfolder">
				<ul class="dform square01" data-id="rfrcList">
					<li>
						<label for="la-1">
						<span class="ico-myfolder20">새글</span>
							<p class="summary"><img src="../../../img/@tmp_img_myfolder.png" alt=""/></p>
							<p class="subject"><input id="la-1" type="checkbox" />글제목이 들어가는 자리</p>
						</label>
					</li>
					<li>
						<label for="la-2">
						<span class="ico-myfolder30">Hot</span>
							<p class="summary"><img src="../../../img/@tmp_img_myfolder.png" alt=""/></p>
							<p class="subject"><input id="la-2" type="checkbox" />글제</p>
						</label>
					</li>
					<li>
						<label for="la-3">
						<span class="ico-myfolder40">Best</span>
							<p class="summary"><img src="../../../img/@tmp_img_myfolder.png" alt=""/></p>
							<p class="subject"><input id="la-3" type="checkbox" />글제목이 들어가는 자리글제목이 들어가는 자리글제목이 들어가는 자리글제목이 들어가는 자리</p>
						</label>
					</li>
					<li>
						<label for="la-4">
						<span class="ico-myfolder30">Hot</span>
							<p class="summary"><img src="../../../img/@tmp_img_myfolder.png" alt=""/></p>
							<p class="subject"><input id="la-4" type="checkbox" />글제목이 들어가는 자리</p>
						</label>
					</li>
					<li>
						<label for="la-5">
						<span class="ico-myfolder30">Hot</span>
							<p class="summary"><img src="../../../img/@tmp_img_myfolder.png" alt=""/></p>
							<p class="subject"><input id="la-5" type="checkbox" />글제목이 들어가는 자리</p>
						</label>
					</li>
				</ul>
			</div>
		</div>
	</div>

	<!-- footer 고정영역 -->
	<footer>
		<div class="d-footer"><!-- 목록 선택 시 disabled 삭제 -->
			<button class="lbtn btn-st03" disabled data-fn="preview">미리보기</button>
			<button class="lbtn btn-st03 none" disabled data-fn="detailView">상세보기</button>
			<button class="lbtn btn-st01" disabled data-fn="sendSMS">고객공유</button>
			<button class="lbtn btn-st02" disabled data-fn="deleteMyRfrc">삭제</button>
		</div>
	</footer>
	<!-- //footer -->


</div>
<!--// fullpopup 영역 -->

</body>
</html>
