<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>사고보험금 청구 진행현황</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
</head>
<body>

<!-- 화면 영역 -->
<div class="d-wrap">

	<!-- header 고정영역 -->
	<header>
		<div class="d-head">
			<h1>사고보험금 청구 진행현황</h1>
			<button class="lbtn btn-back">홈으로</button>
			<button class="rbtn btn-view-side">전체메뉴</button>
		</div>
	</header>
	<!-- //header -->

	<!-- body_searchBox 고정영역 -->
	<fieldset class="blueBox-st01">
		<legend>검색항목 영역</legend>
		<ul class="search">
			<li>
				<label class="label-txt">고객명</label>
				<input class="inp-wrap" type="text" placeholder="고객명을 입력하세요." />
				<button class="sbtn-search" type="submit">검색</button>
			</li>
		</ul>
	</fieldset>

	<!-- body_resultBox 스크롤영역 -->
	<div class="d-cont d-scroll">
		<h2 class="ui-hidden-accessible">검색결과 영역</h2>

		<!-- 검색 전 문구
		<div class="no-data">고객명을 입력하고 검색을 진행해 주세요.</div>-->
		<!-- 검색 후 문구
		<div class="no-data">검색결과가 없습니다.</div>-->

		<div>
			<p class="result-txt">총 5건이 검색되었습니다.</p>
			<ul class="link-list-st01">
				<li>
					<div class="tit-h2">
						<a class="link-go" href='#'>
							<span class="pro-num">123456789012</span><!-- 2018-05-09 -->
							<span class="pro-stit">프리미엄건강보험 무배당</span>
						</a>
						<p class="tit-h2-con">
							<span class="status-02">접수 중</span>
						</p>
					</div>
					<article class="link-list-con">
						<ul class="bul-list-st01 col-02"><!-- 2018-05-09 -->
							<li>
								<span class="stit">접수일</span>
								<span class="scon">2017.12.12</span>
							</li>
							<li>
								<span class="stit">계약자</span>
								<span class="scon">홍길동</span>
							</li>
							<li>
								<span class="stit">사고일</span>
								<span class="scon">2017.11.01</span>
							</li>
							<li>
								<span class="stit">피보험자</span>
								<span class="scon">홍길동</span>
							</li>
						</ul>
					</article>
				</li>
			</ul>
		</div>
	</div>

</div>
<!--// 화면 영역 -->

</body>
</html>
