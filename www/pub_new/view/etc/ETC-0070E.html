<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, address=no, email=no" />
<title>자료실</title>
<link rel="stylesheet" type="text/css" href="../../../css/d-lite_style.css"/>
</head>
<body>

<!-- 화면 영역 -->
<div class="d-wrap">

	<!-- header 고정영역 -->
	<header>
		<div class="d-head">
			<h1>자료실</h1>
			<button class="lbtn btn-back">홈으로</button>
			<button class="rbtn2 btn-myfolder" title="my자료갯수">10</button>
			<button class="rbtn btn-view-side">전체메뉴</button>
		</div>
	</header>
	<!-- //header -->

	<!-- body_tab 고정영역 -->
	<div>
		<ul class="tab col-4"><!-- 2018-04-09 -->
			<li><button>상품안내장</button></li>
			<li><button>인포슈랑스</button></li>
			<li class="on"><button>니즈자료</button></li>
			<li><button>기타</button></li>
		</ul>
	</div>


	<!-- body_resultBox 스크롤영역 -->
	<div class="d-cont d-scroll bg-st02">
		<div class="cont1">
			<ul class="stab">
				<li class="on"><button>은퇴</button></li>
				<li><button>건강</button></li>
				<li><button>사망</button></li>
				<li><button>목적자금</button></li>
				<li><button>통계스토리</button></li>
			</ul>

			<div class="myfolder">
				<h2 class="ui-hidden-accessible">니즈자료 > 은퇴자료 목록</h2>
				<ul class="dform square01">
					<li>
						<label for="la-1">
						<span class="ico-myfolder20">새글</span>
							<p class="summary">썸네일 이미지 없음</p><!-- 2018-05-28 -->
							<p class="subject"><input id="la-1" type="checkbox" />글제목이 들어가는 자리</p>
						</label>
					</li>
					<li>
						<label for="la-2">
						<span class="ico-myfolder30">Hot</span>
							<p class="summary"><img src="../../../img/@tmp_img_myfolder.png" alt=""/></p>
							<p class="subject"><input id="la-2" type="checkbox" />글제</p>
						</label>
					</li>
					<li>
						<label for="la-3">
						<span class="ico-myfolder40">Best</span>
							<p class="summary"><img src="../../../img/@tmp_img_myfolder.png" alt=""/></p>
							<p class="subject"><input id="la-3" type="checkbox" />글제목이 들어가는 자리글제목이 들어가는 자리글제목이 들어가는 자리글제목이 들어가는 자리</p>
						</label>
					</li>
					<li>
						<label for="la-4">
						<span class="ico-myfolder30">Hot</span>
							<p class="summary"><img src="../../../img/@tmp_img_myfolder.png" alt=""/></p>
							<p class="subject"><input id="la-4" type="checkbox" />글제목이 들어가는 자리</p>
						</label>
					</li>
					<li>
						<label for="la-5">
						<span class="ico-myfolder30">Hot</span>
							<p class="summary"><img src="../../../img/@tmp_img_myfolder.png" alt=""/></p>
							<p class="subject"><input id="la-5" type="checkbox" />글제목이 들어가는 자리</p>
						</label>
					</li>
				</ul>
			</div>
		</div>
	</div>

	<!-- footer 고정영역 -->
	<footer>
		<div class="d-footer"><!-- 목록 선택 시 disabled 삭제 -->
			<button class="lbtn btn-st03" disabled >미리보기</button>
			<button class="lbtn btn-st01" disabled >고객공유</button>
			<button class="lbtn btn-st02" disabled >My자료담기</button>
		</div>
	</footer>
	<!-- //footer -->

</div>
<!--// 화면 영역 -->

</body>
</html>
